<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan des parcs — Projet 2 (test)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#1a202c;min-height:100vh}
  .header{background:#fff;border-bottom:1px solid #e2e8f0;padding:1rem 1.5rem}
  .header h1{font-size:1.1rem;font-weight:600}
  .header p{font-size:.8rem;color:#718096}
  .main{max-width:100%;margin:0 auto;padding:1.25rem}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem;padding:.85rem 1rem;background:#fff;border:1px solid #e2e8f0;border-radius:12px}
  .toolbar label{font-size:.8rem;color:#718096;font-weight:500}
  .toolbar input{padding:.4rem .6rem;border:1px solid #e2e8f0;border-radius:8px;font-size:.85rem;width:65px}
  .btn{padding:.5rem 1rem;border-radius:8px;font-size:.85rem;font-weight:500;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#1a202c;white-space:nowrap}
  .btn:hover{background:#f8f9fa}
  .btn-primary{background:#0ea5e9;color:#fff;border-color:#0ea5e9}
  .btn-primary:hover{background:#0284c7}
  .btn-danger{color:#e24b4a;border-color:#e24b4a}
  .btn-danger:hover{background:#fff5f5}
  .grid-wrap{overflow:auto;border:1px solid #e2e8f0;border-radius:12px;background:#fff;max-height:75vh}
  table.grid{border-collapse:collapse}
  table.grid td, table.grid th{border:1px solid #edf0f3;padding:0;text-align:center}
  table.grid th.colhead{font-size:.65rem;color:#a0aec0;font-weight:500;min-width:26px;width:26px;height:20px;background:#fafbfc;position:sticky;top:0;z-index:2}
  table.grid th.rowhead{font-size:.7rem;color:#718096;font-weight:600;width:34px;background:#fafbfc;position:sticky;left:0;z-index:2}
  table.grid th.corner{position:sticky;top:0;left:0;z-index:3;background:#fafbfc}
  td.cell{width:26px;height:26px;cursor:pointer;background:#fff}
  td.cell:hover{background:#f0f9ff}
  td.blockcell{font-size:.62rem;font-weight:600;line-height:1.1;padding:1px;overflow:hidden;white-space:nowrap}
  .rowdel{font-size:.65rem;color:#cbd5e0;cursor:pointer;padding:0 3px}
  .rowdel:hover{color:#e24b4a}
  .legend{font-size:.78rem;color:#a0aec0;margin-bottom:.75rem}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:1rem}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:14px;padding:1.25rem;width:100%;max-width:360px}
  .modal p.title{font-weight:600;font-size:.95rem;margin-bottom:12px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:.78rem;color:#718096;margin-bottom:4px}
  .field input,.field select{width:100%;padding:.45rem .6rem;border:1px solid #e2e8f0;border-radius:8px;font-size:.85rem}
  .swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .swatch{width:26px;height:26px;border-radius:7px;cursor:pointer;border:2px solid transparent}
  .swatch.sel{border-color:#1a202c}
  .dirgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;width:140px}
  .dirbtn{padding:.5rem;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:.85rem;text-align:center}
  .dirbtn.sel{background:#0ea5e9;color:#fff;border-color:#0ea5e9}
  .dirbtn:disabled{opacity:.25;cursor:default}
  .modalbtns{display:flex;gap:8px;margin-top:14px}
  .modalbtns .btn{flex:1;text-align:center;display:flex;justify-content:center}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a202c;color:#fff;padding:.6rem 1.2rem;border-radius:10px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300}
  .toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <h1>Plan des parcs — version test (Projet 2)</h1>
  <p>Grille complete facon tableur - vos donnees restent dans ce navigateur uniquement</p>
</div>

<div class="main">
  <div class="toolbar">
    <label>Poches / case</label>
    <input type="number" id="ppc" value="10" min="1">
    <label>Colonnes</label>
    <input type="number" id="ncols" value="60" min="5">
    <label>Rangees</label>
    <input type="number" id="nrows" value="20" min="1">
    <button class="btn btn-primary" onclick="applyGridSize()">Appliquer</button>
    <span style="flex:1"></span>
    <button class="btn btn-danger" onclick="resetAll()">Tout effacer</button>
    <button class="btn" onclick="exportJSON()">Exporter</button>
    <button class="btn" onclick="document.getElementById('importFile').click()">Importer</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>

  <div class="legend">Cliquez sur une case vide pour creer un bloc, choisissez la direction de remplissage. Cliquez sur un bloc existant pour le modifier ou le supprimer.</div>

  <div class="grid-wrap">
    <table class="grid" id="gridTable"></table>
  </div>
</div>

<div class="overlay" id="modalBg">
  <div class="modal">
    <p class="title">Details du bloc</p>
    <div class="field">
      <label>Type de bloc</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <button type="button" class="dirbtn" id="type-lot" onclick="pickBlockType('lot')">Lot</button>
        <button type="button" class="dirbtn" id="type-libre" onclick="pickBlockType('libre')">Libre</button>
      </div>
    </div>
    <div id="lotFields">
      <div class="field"><label>Numero de lot</label><input type="text" id="m-lot" placeholder="ex: 02S25"></div>
      <div class="field"><label>Nombre de poches</label><input type="number" id="m-poches" min="1" value="10"></div>
      <div class="field"><label>Grammage</label><input type="text" id="m-gram" placeholder="ex: 27g ou K2"></div>
      <div class="field"><label>Poids/p (kg)</label><input type="number" id="m-poids" step="0.1" placeholder="ex: 5.5"></div>
      <div class="field"><label>Date</label><input type="date" id="m-date"></div>
      <div class="field"><label>Notes</label><input type="text" id="m-notes" placeholder="observations"></div>
    </div>
    <div id="libreFields" style="display:none">
      <div class="field"><label>Texte libre</label><input type="text" id="m-libretext" placeholder="ex: Zone reservee, Acces tracteur..."></div>
      <div class="field"><label>Nombre de cases</label><input type="number" id="m-nbcases" min="1" value="1"></div>
    </div>
    <div class="field">
      <label>Style du texte</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
        <select id="m-fontsize">
          <option value="10">Petit</option>
          <option value="12" selected>Normal</option>
          <option value="14">Grand</option>
          <option value="16">Tres grand</option>
        </select>
        <select id="m-fontweight">
          <option value="400">Normal</option>
          <option value="700" selected>Gras</option>
        </select>
        <select id="m-textalign">
          <option value="left">Gauche</option>
          <option value="center" selected>Centre</option>
          <option value="right">Droite</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Bordure du bloc</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
        <select id="m-borderwidth">
          <option value="1">Fine</option>
          <option value="2" selected>Normale</option>
          <option value="3">Epaisse</option>
          <option value="4">Tres epaisse</option>
        </select>
        <select id="m-borderstyle">
          <option value="solid" selected>Pleine</option>
          <option value="dashed">Pointillee</option>
          <option value="dotted">Petits points</option>
          <option value="double">Double</option>
        </select>
      </div>
      <input type="color" id="m-bordercolor" value="#1a202c" style="width:100%;height:34px;padding:2px">
    </div>
    <div class="field">
      <label>Direction de remplissage</label>
      <div class="dirgrid" id="dirgrid">
        <span></span>
        <button type="button" class="dirbtn" id="dir-up" onclick="pickDir('up')">Haut</button>
        <span></span>
        <button type="button" class="dirbtn" id="dir-left" onclick="pickDir('left')">Gauche</button>
        <span style="display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#a0aec0">o</span>
        <button type="button" class="dirbtn" id="dir-right" onclick="pickDir('right')">Droite</button>
        <span></span>
        <button type="button" class="dirbtn" id="dir-down" onclick="pickDir('down')">Bas</button>
        <span></span>
      </div>
    </div>
    <div class="field">
      <label>Couleur</label>
      <div class="swatches" id="swatches"></div>
    </div>
    <div class="modalbtns">
      <button class="btn btn-primary" onclick="saveBlock()">Enregistrer</button>
      <button class="btn btn-danger" onclick="deleteBlock()" id="delBtn" style="display:none">Supprimer</button>
      <button class="btn" onclick="closeModal()">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'plan_parc_test_v2';
var ppc = 10, ncols = 60, nrows = 20;
var blocks = [];
var editing = null;
var selDir = 'right';

var COLORS = ['#FAC775','#85B7EB','#F0997B','#97C459','#ED93B1','#AFA9EC','#B4B2A9','#5DCAA5'];
var selColor = COLORS[0];
var blockType = 'lot';

function pickBlockType(t){
  blockType = t;
  document.getElementById('type-lot').classList.toggle('sel', t==='lot');
  document.getElementById('type-libre').classList.toggle('sel', t==='libre');
  document.getElementById('lotFields').style.display = t==='lot' ? 'block' : 'none';
  document.getElementById('libreFields').style.display = t==='libre' ? 'block' : 'none';
}

function loadState(){
  try{
    var saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
      var data = JSON.parse(saved);
      ppc = data.ppc || 10;
      ncols = data.ncols || 60;
      nrows = data.nrows || 20;
      blocks = data.blocks || [];
    }
  }catch(e){ console.error('Erreur chargement', e); }
  document.getElementById('ppc').value = ppc;
  document.getElementById('ncols').value = ncols;
  document.getElementById('nrows').value = nrows;
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ppc:ppc, ncols:ncols, nrows:nrows, blocks:blocks}));
  }catch(e){ console.error('Erreur sauvegarde', e); }
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 1800);
}

function applyGridSize(){
  ppc = parseInt(document.getElementById('ppc').value)||10;
  ncols = parseInt(document.getElementById('ncols').value)||60;
  nrows = parseInt(document.getElementById('nrows').value)||20;
  saveState();
  render();
}

function deleteRow(r){
  if(!confirm('Supprimer la rangee '+(r+1)+' et tous ses blocs ?')) return;
  blocks = blocks.filter(function(b){ return b.row!==r; });
  blocks.forEach(function(b){ if(b.row>r) b.row--; });
  nrows = Math.max(1, nrows-1);
  document.getElementById('nrows').value = nrows;
  saveState();
  render();
}

function cellsOfBlock(b){
  var span = b.type==='libre' ? Math.max(1, b.nbcases||1) : Math.max(1, Math.ceil(b.poches/ppc));
  var cells = [];
  for(var i=0;i<span;i++){
    var r=b.row, c=b.col;
    if(b.dir==='right') c=b.col+i;
    else if(b.dir==='left') c=b.col-i;
    else if(b.dir==='down') r=b.row+i;
    else if(b.dir==='up') r=b.row-i;
    cells.push([r,c]);
  }
  return cells;
}

function occupancyMap(){
  var map = {};
  blocks.forEach(function(b,bi){
    cellsOfBlock(b).forEach(function(pair){
      map[pair[0]+'_'+pair[1]] = bi;
    });
  });
  return map;
}

function darken(hex){
  var r = Math.max(0,parseInt(hex.slice(1,3),16)-90);
  var g = Math.max(0,parseInt(hex.slice(3,5),16)-90);
  var b = Math.max(0,parseInt(hex.slice(5,7),16)-90);
  return 'rgb('+r+','+g+','+b+')';
}

function escapeHtml(str){
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function render(){
  var occ = occupancyMap();
  var html = '<thead><tr><th class="corner"></th>';
  for(var c=0;c<ncols;c++){
    html += '<th class="colhead">'+(c+1)+'</th>';
  }
  html += '</tr></thead><tbody>';

  for(var r=0;r<nrows;r++){
    html += '<tr><th class="rowhead">L'+(r+1)+' <span class="rowdel" onclick="deleteRow('+r+')" title="Supprimer">x</span></th>';
    var c2 = 0;
    while(c2 < ncols){
      var bi = occ[r+'_'+c2];
      if(bi === undefined){
        html += '<td class="cell" onclick="openNew('+r+','+c2+')"></td>';
        c2++;
      } else {
        var b = blocks[bi];
        var cells = cellsOfBlock(b);
        var isVertical = (b.dir === 'up' || b.dir === 'down');
        var isFirstCellOfBlock = !cells.some(function(pair){
          return occ[pair[0]+'_'+pair[1]]===bi && (pair[0]<r || (pair[0]===r && pair[1]<c2));
        });
        if(!isFirstCellOfBlock){
          c2++;
          continue;
        }
        var label, tipParts;
        if(b.type === 'libre'){
          label = escapeHtml(b.libretext||'');
          tipParts = [escapeHtml(b.libretext||'')];
        } else {
          label = escapeHtml(b.lot||'-')+' '+b.poches+'p';
          tipParts = [escapeHtml(b.lot||''), b.poches+'p'];
          if(b.gram) tipParts.push(escapeHtml(b.gram));
          if(b.poids) tipParts.push(b.poids+'kg');
          if(b.date) tipParts.push(b.date);
          if(b.notes) tipParts.push(escapeHtml(b.notes));
        }
        var fs = b.fontsize || '12';
        var fw = b.fontweight || '700';
        var ta = b.textalign || 'center';
        var bw = b.borderwidth || '2';
        var bs = b.borderstyle || 'solid';
        var bc = b.bordercolor || '#1a202c';
        var cellStyle = 'background:'+b.color+'55;color:'+darken(b.color)+
          ';font-size:'+fs+'px;font-weight:'+fw+';text-align:'+ta+
          ';border:'+bw+'px '+bs+' '+bc;
        var spanAttr, innerHtml;
        if(isVertical){
          var span = cells.length;
          spanAttr = 'rowspan="'+span+'"';
          cellStyle += ';padding:4px 2px';
          innerHtml = '<div style="writing-mode:vertical-rl;text-orientation:mixed;height:100%;display:flex;align-items:center;justify-content:'+(ta==='left'?'flex-start':ta==='right'?'flex-end':'center')+'">'+label+'</div>';
        } else {
          spanAttr = 'colspan="'+cells.length+'"';
          innerHtml = label;
        }
        html += '<td class="cell blockcell" '+spanAttr+' style="'+cellStyle+'" onclick="openEdit('+bi+')" title="'+tipParts.join(' - ')+'">'+innerHtml+'</td>';
        if(!isVertical) c2 += cells.length;
        else c2++;
      }
    }
    html += '</tr>';
  }
  html += '</tbody>';
  document.getElementById('gridTable').innerHTML = html;
}

function buildSwatches(){
  document.getElementById('swatches').innerHTML = COLORS.map(function(c){
    return '<div class="swatch'+(c===selColor?' sel':'')+'" style="background:'+c+'" onclick="pickColor(\''+c+'\')"></div>';
  }).join('');
}

function pickColor(c){
  selColor = c;
  buildSwatches();
}

function buildDirButtons(r,col,isNew){
  ['up','down','left','right'].forEach(function(d){
    var btn = document.getElementById('dir-'+d);
    btn.classList.toggle('sel', d===selDir);
    var disabled = false;
    if(isNew){
      if(d==='up' && r===0) disabled = true;
      if(d==='left' && col===0) disabled = true;
    }
    btn.disabled = disabled;
  });
}

function pickDir(d){
  var btn = document.getElementById('dir-'+d);
  if(btn.disabled) return;
  selDir = d;
  buildDirButtons(editing.row, editing.col, editing.isNew);
}

function openNew(r,c){
  editing = {row:r, col:c, isNew:true};
  document.getElementById('m-lot').value='';
  document.getElementById('m-poches').value=ppc;
  document.getElementById('m-gram').value='';
  document.getElementById('m-poids').value='';
  document.getElementById('m-date').value='';
  document.getElementById('m-notes').value='';
  document.getElementById('m-libretext').value='';
  document.getElementById('m-nbcases').value='1';
  document.getElementById('m-fontsize').value='12';
  document.getElementById('m-fontweight').value='700';
  document.getElementById('m-textalign').value='center';
  document.getElementById('m-borderwidth').value='2';
  document.getElementById('m-borderstyle').value='solid';
  document.getElementById('m-bordercolor').value='#1a202c';
  pickBlockType('lot');
  selColor = COLORS[Math.floor(Math.random()*COLORS.length)];
  selDir = 'right';
  buildSwatches();
  buildDirButtons(r,c,true);
  document.getElementById('delBtn').style.display='none';
  document.getElementById('modalBg').classList.add('open');
}

function openEdit(bi){
  var b = blocks[bi];
  editing = {blockIdx:bi, row:b.row, col:b.col, isNew:false};
  document.getElementById('m-lot').value=b.lot||'';
  document.getElementById('m-poches').value=b.poches||ppc;
  document.getElementById('m-gram').value=b.gram||'';
  document.getElementById('m-poids').value=b.poids||'';
  document.getElementById('m-date').value=b.date||'';
  document.getElementById('m-notes').value=b.notes||'';
  document.getElementById('m-libretext').value=b.libretext||'';
  document.getElementById('m-nbcases').value=b.nbcases||1;
  document.getElementById('m-fontsize').value=b.fontsize||'12';
  document.getElementById('m-fontweight').value=b.fontweight||'700';
  document.getElementById('m-textalign').value=b.textalign||'center';
  document.getElementById('m-borderwidth').value=b.borderwidth||'2';
  document.getElementById('m-borderstyle').value=b.borderstyle||'solid';
  document.getElementById('m-bordercolor').value=b.bordercolor||'#1a202c';
  pickBlockType(b.type||'lot');
  selColor = b.color;
  selDir = b.dir;
  buildSwatches();
  buildDirButtons(b.row, b.col, false);
  document.getElementById('delBtn').style.display='inline-flex';
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  editing = null;
}

function saveBlock(){
  if(!editing) return;
  var data = {
    row: editing.row,
    col: editing.col,
    dir: selDir,
    type: blockType,
    lot: document.getElementById('m-lot').value.trim(),
    poches: parseInt(document.getElementById('m-poches').value)||ppc,
    gram: document.getElementById('m-gram').value.trim(),
    poids: document.getElementById('m-poids').value,
    date: document.getElementById('m-date').value,
    notes: document.getElementById('m-notes').value.trim(),
    libretext: document.getElementById('m-libretext').value.trim(),
    nbcases: parseInt(document.getElementById('m-nbcases').value)||1,
    color: selColor,
    fontsize: document.getElementById('m-fontsize').value,
    fontweight: document.getElementById('m-fontweight').value,
    textalign: document.getElementById('m-textalign').value,
    borderwidth: document.getElementById('m-borderwidth').value,
    borderstyle: document.getElementById('m-borderstyle').value,
    bordercolor: document.getElementById('m-bordercolor').value
  };
  if(editing.isNew){
    blocks.push(data);
  } else {
    blocks[editing.blockIdx] = data;
  }
  closeModal();
  saveState();
  render();
  showToast('Bloc enregistre');
}

function deleteBlock(){
  if(!editing || editing.isNew) return;
  blocks.splice(editing.blockIdx,1);
  closeModal();
  saveState();
  render();
  showToast('Bloc supprime');
}

function resetAll(){
  if(!confirm('Effacer TOUT le plan ? Cette action est irreversible.')) return;
  blocks = [];
  saveState();
  render();
  showToast('Plan reinitialise');
}

function exportJSON(){
  var data = {ppc:ppc, ncols:ncols, nrows:nrows, blocks:blocks};
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'plan-parc-test.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export telecharge');
}

function importJSON(event){
  var file = event.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      ppc = data.ppc || 10;
      ncols = data.ncols || 60;
      nrows = data.nrows || 20;
      blocks = data.blocks || [];
      document.getElementById('ppc').value = ppc;
      document.getElementById('ncols').value = ncols;
      document.getElementById('nrows').value = nrows;
      saveState();
      render();
      showToast('Import reussi');
    }catch(err){
      alert('Fichier invalide.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

loadState();
render();
</script>
</body>
</html>
