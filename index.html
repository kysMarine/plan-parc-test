<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan des parcs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#1a202c;height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:.75rem 1.25rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:50;flex-shrink:0}
.header h1{font-size:1rem;font-weight:600;margin-right:8px}
.btn{padding:.4rem .9rem;border-radius:8px;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#1a202c;white-space:nowrap}
.btn:hover{background:#f1f5f9}
.btn-primary{background:#0ea5e9;color:#fff;border-color:#0ea5e9}
.btn-primary:hover{background:#0284c7}
.btn-danger{color:#e24b4a;border-color:#fecaca}
.btn-danger:hover{background:#fff5f5}
.sep{width:1px;height:20px;background:#e2e8f0;flex-shrink:0}
.zoom-info{font-size:.78rem;color:#718096;min-width:40px;text-align:center}

/* GRILLE */
.grid-wrap{overflow:auto;flex:1;min-height:200px;cursor:crosshair;background:#fff}
.grid-inner{display:inline-block}
table{border-collapse:collapse;table-layout:fixed;width:0}
col{width:20px}
col.rowhead-col{width:40px}
td,th{border:0.5px solid #e8eaed;padding:0;overflow:hidden;min-width:0;box-sizing:border-box}
th.corner{position:sticky;top:0;left:0;z-index:10;background:#f8f9fa;width:40px;height:20px}
th.ch{font-size:7px;color:#bbb;font-weight:400;background:#f8f9fa;height:20px;text-align:center;position:sticky;top:0;z-index:3;width:20px;min-width:20px;max-width:20px}
th.rh{font-size:7px;color:#bbb;font-weight:400;background:#f8f9fa;width:40px;min-width:40px;max-width:40px;text-align:right;padding-right:4px;position:sticky;left:0;z-index:2}
td.cell{width:20px;min-width:20px;max-width:20px;height:20px;min-height:20px;max-height:20px;background:#fff;cursor:crosshair}
td.cell:hover{background:#eff6ff}
td.cell.drag-sel{background:#bfdbfe}
td.cell.zone-sel{background:#bbf7d0;outline:1px solid #22c55e;outline-offset:-1px}
td.blockcell{font-size:8px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
td.blockcell:hover{filter:brightness(.93)}
td.blockcell.highlighted{outline:2px solid #e63946;outline-offset:-1px;z-index:2}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.25rem;width:100%;max-width:340px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:.95rem;font-weight:600;margin-bottom:12px}
.field{margin-bottom:9px}
.field label{display:block;font-size:.75rem;color:#718096;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:.4rem .6rem;border:1px solid #e2e8f0;border-radius:7px;font-size:.82rem;font-family:inherit}
.swatches{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.swatch{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.swatch.sel{border-color:#1a202c}
.modal-btns{display:flex;gap:7px;margin-top:12px}
.modal-btns .btn{flex:1;text-align:center}
.info-box{background:#e0f2fe;border:1px solid #bae6fd;border-radius:7px;padding:.4rem .7rem;font-size:.75rem;color:#075985;margin-bottom:9px;display:none}

/* RESULTATS */
.results{padding:.75rem 1.25rem;background:#fff;border-bottom:1px solid #e2e8f0;display:none;flex-shrink:0}
.results.open{display:block}
.res-card{font-size:.82rem}
.res-card table{width:100%;border-collapse:collapse;margin-top:8px}
.res-card th{text-align:left;padding:4px 8px;border-bottom:1px solid #e2e8f0;font-size:.75rem;font-weight:500;background:#f8f9fa}
.res-card td{padding:4px 8px;border-bottom:1px solid #f1f5f9}
.res-card tr:hover td{background:#f0f9ff;cursor:pointer}

/* PRINT */
@media print{
  .header,.results{display:none!important}
  .grid-wrap{height:auto;overflow:visible}
  .grid-inner{transform:none!important}
}

/* ONGLETS */
/* NAVIGATION PARCS / ZONES */
.nav-parcs{display:flex;align-items:center;gap:0;background:#1e293b;padding:0 1rem;flex-shrink:0;overflow-x:auto}
.parc-tab{padding:.5rem 1.1rem;font-size:.82rem;font-weight:500;cursor:pointer;border:none;background:none;color:#94a3b8;white-space:nowrap;display:flex;align-items:center;gap:6px;border-bottom:2px solid transparent}
.parc-tab:hover{color:#e2e8f0}
.parc-tab.active{color:#fff;border-bottom-color:#0ea5e9}
.parc-add{padding:.5rem .8rem;font-size:1rem;color:#64748b;cursor:pointer;border:none;background:none}
.parc-add:hover{color:#0ea5e9}
.nav-zones{display:flex;align-items:center;gap:0;background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:0 .75rem;flex-shrink:0;overflow-x:auto}
.zone-tab{padding:.4rem .9rem;font-size:.8rem;font-weight:500;cursor:pointer;border:none;background:none;color:#64748b;white-space:nowrap;display:flex;align-items:center;gap:5px;border-bottom:2px solid transparent}
.zone-tab:hover{color:#1a202c}
.zone-tab.active{color:#0ea5e9;border-bottom-color:#0ea5e9;background:#fff}
.zone-add{padding:.4rem .6rem;font-size:.9rem;color:#94a3b8;cursor:pointer;border:none;background:none}
.zone-add:hover{color:#0ea5e9}
.tab-close{font-size:.65rem;color:#a0aec0;cursor:pointer;border-radius:3px;padding:1px 3px;line-height:1}
.tab-close:hover{background:#fecaca;color:#e24b4a}
.nav-label{font-size:.7rem;font-weight:600;color:#475569;padding:0 .5rem 0 0;text-transform:uppercase;letter-spacing:.05em}
/* MENU CONTEXTUEL */
.ctx-menu{display:none;position:fixed;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:300;min-width:180px;overflow:hidden}
.ctx-menu.open{display:block}
.ctx-label{font-size:.72rem;font-weight:600;color:#718096;padding:.4rem .9rem .2rem;text-transform:uppercase;letter-spacing:.04em}
.ctx-item{display:block;width:100%;text-align:left;padding:.5rem .9rem;font-size:.82rem;cursor:pointer;border:none;background:#fff;color:#1a202c}
.ctx-item:hover{background:#f8f9fa}
.ctx-danger{color:#e24b4a}
.ctx-danger:hover{background:#fff5f5}
.ctx-sep{height:1px;background:#e2e8f0;margin:2px 0}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a202c;color:#fff;padding:.5rem 1.1rem;border-radius:10px;font-size:.82rem;opacity:0;transition:opacity .25s;pointer-events:none;z-index:500}
.toast.show{opacity:1}

/* DROPDOWN */
.dropdown{position:relative;display:inline-block}
.dropdown-btn{display:flex;align-items:center;gap:4px}
.dropdown-btn::after{content:'‚ñæ';font-size:.65rem;color:#718096}
.dropdown-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);min-width:160px;z-index:100;overflow:hidden}
.dropdown-menu.open{display:block}
.dropdown-item{display:block;width:100%;text-align:left;padding:.55rem 1rem;font-size:.82rem;font-weight:500;cursor:pointer;border:none;background:#fff;color:#1a202c}
.dropdown-item:hover{background:#f8f9fa}
.dropdown-sep{height:1px;background:#e2e8f0;margin:2px 0}
</style>
</head>
<body>

<div class="header">
  <!-- Ligne 1 : titre + recherche + param√®tres grille -->
  <div style="display:flex;align-items:center;gap:10px;width:100%;flex-wrap:nowrap">
    <h1>Plan des parcs</h1>
    <div class="sep"></div>
    <input type="text" id="inp-search" placeholder="Rechercher un lot..." style="width:170px;padding:.35rem .65rem;border:1px solid #e2e8f0;border-radius:7px;font-size:.82rem" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn btn-primary" onclick="doSearch()" style="padding:.35rem .75rem">Chercher</button>
    <button class="btn" onclick="clearSearch()" style="padding:.35rem .6rem">‚úï</button>
    <div class="sep"></div>
    <label style="font-size:.75rem;color:#718096">Colonnes</label>
    <input type="number" id="inp-cols" value="100" min="10" max="500" style="width:58px;padding:.3rem .5rem;border:1px solid #e2e8f0;border-radius:7px;font-size:.82rem">
    <label style="font-size:.75rem;color:#718096">Rang√©es</label>
    <input type="number" id="inp-rows" value="30" min="5" max="300" style="width:58px;padding:.3rem .5rem;border:1px solid #e2e8f0;border-radius:7px;font-size:.82rem">
    <label style="font-size:.75rem;color:#718096">Poches/px</label>
    <input type="number" id="inp-ppp" value="2" min="0.1" step="0.1" style="width:58px;padding:.3rem .5rem;border:1px solid #e2e8f0;border-radius:7px;font-size:.82rem">
    <button class="btn btn-primary" onclick="applySettings()">Appliquer</button>
    <div class="sep"></div>
    <button onclick="doZoom(-0.15)" style="width:26px;height:26px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:15px">‚àí</button>
    <span class="zoom-info" id="zoom-label">100%</span>
    <button onclick="doZoom(0.15)" style="width:26px;height:26px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:15px">+</button>
    <button class="btn" onclick="doZoom(-99)">100%</button>
    <div class="sep"></div>
    <!-- Menu Calculs -->
    <div class="dropdown" id="dd-calculs">
      <button class="btn dropdown-btn" onclick="toggleDD('dd-calculs')">Calculs</button>
      <div class="dropdown-menu" id="dd-calculs-menu">
        <button class="dropdown-item" onclick="calcVides();closeDD()">üìä Emplacements vides</button>
        <div class="dropdown-sep"></div>
        <button class="dropdown-item" onclick="calcRef('K2');closeDD()">‚öñÔ∏è Poids total K2</button>
        <button class="dropdown-item" onclick="calcRef('K3');closeDD()">‚öñÔ∏è Poids total K3</button>
      </div>
    </div>
    <div class="sep"></div>
    <button class="btn" id="undoBtn" onclick="undo()" disabled>Annuler</button>
    <button class="btn" id="redoBtn" onclick="redo()" disabled>R√©tablir</button>
    <div class="sep"></div>
    <button class="btn" id="selModeBtn" onclick="toggleSelMode()">S√©lection</button>
    <span id="selInfo" style="display:none;font-size:.75rem;color:#0ea5e9;padding:2px 8px;background:#e0f2fe;border-radius:6px"></span>
    <div class="sep"></div>
    <!-- Menu Fichier -->
    <div class="dropdown" id="dd-fichier">
      <button class="btn dropdown-btn" onclick="toggleDD('dd-fichier')">Fichier</button>
      <div class="dropdown-menu" id="dd-fichier-menu">
        <button class="dropdown-item" onclick="openPrint();closeDD()">üñ®Ô∏è Imprimer</button>
        <div class="dropdown-sep"></div>
        <button class="dropdown-item" onclick="exportData();closeDD()">üíæ Exporter (.json)</button>
        <div class="dropdown-sep"></div>
        <button class="dropdown-item" style="color:#e24b4a" onclick="resetAll();closeDD()">üóë Tout effacer</button>
      </div>
    </div>
  </div>
</div>

<div class="results" id="results"><div class="res-card" id="res-content"></div></div>

<!-- ONGLETS -->
<div class="nav-parcs" id="navParcs"></div>
<div class="nav-zones" id="navZones"></div>

<!-- MENU CONTEXTUEL -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-label" id="ctxLabel"></div>
  <button class="ctx-item" id="ctx-ins-before" onclick="ctxAction('ins-before')"></button>
  <button class="ctx-item" id="ctx-ins-after" onclick="ctxAction('ins-after')"></button>
  <div class="ctx-sep"></div>
  <button class="ctx-item ctx-danger" id="ctx-delete" onclick="ctxAction('delete')"></button>
</div>

<div class="grid-wrap" id="gridWrap">
  <div class="grid-inner" id="gridInner">
    <table id="grid"></table>
  </div>
</div>

<!-- MODAL LOT -->
<div class="overlay" id="modalLot">
  <div class="modal">
    <div class="modal-title" id="lot-title">Nouveau lot</div>
    <div class="field">
      <label>Nombre de poches</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" id="l-poches" min="1" value="10" style="flex:1">
        <label style="display:flex;align-items:center;gap:5px;font-size:.78rem;color:#718096;cursor:pointer;white-space:nowrap">
          <input type="checkbox" id="l-vide" onchange="toggleVide()"> Vide
        </label>
      </div>
    </div>
    <div id="lot-detail-fields">
    <div class="field"><label>Grammage / R√©f√©rence</label><input type="text" id="l-gram" placeholder="ex: 12 ou K2"></div>
    <div class="field"><label>Num√©ro de lot</label><input type="text" id="l-lot" placeholder="ex: 02S25"></div>
    <div class="field"><label>Poids/p (kg)</label><input type="number" id="l-poids" step="0.1" placeholder="ex: 2.4"></div>
    <div class="field"><label>Date</label><input type="date" id="l-date"></div>
    <div class="field"><label>Notes</label><input type="text" id="l-notes" placeholder="observations"></div>
    </div>
    <div class="field"><label>Direction</label>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:120px">
        <span></span><button type="button" class="btn" id="d-up" onclick="setDir('up')">‚Üë</button><span></span>
        <button type="button" class="btn" id="d-left" onclick="setDir('left')">‚Üê</button>
        <span style="display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#ccc">‚óè</span>
        <button type="button" class="btn" id="d-right" onclick="setDir('right')">‚Üí</button>
        <span></span><button type="button" class="btn" id="d-down" onclick="setDir('down')">‚Üì</button><span></span>
      </div>
    </div>
    <div class="field"><label>Couleur</label><div class="swatches" id="lot-swatches"></div></div>
    <div class="field"><label>Style texte</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px">
        <select id="l-fsize"><option value="8">Petit</option><option value="10" selected>Normal</option><option value="12">Grand</option></select>
        <select id="l-fweight"><option value="400">Normal</option><option value="700" selected>Gras</option></select>
        <select id="l-align"><option value="left">G</option><option value="center" selected>C</option><option value="right">D</option></select>
      </div>
    </div>
    <div class="field"><label>Bordure</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">
        <select id="l-bwidth"><option value="1">Fine</option><option value="2" selected>Normale</option><option value="3">√âpaisse</option></select>
        <select id="l-bstyle"><option value="solid">Pleine</option><option value="double" selected>Double</option><option value="dashed">Pointill√©e</option></select>
      </div>
      <input type="color" id="l-bcolor" value="#1a202c" style="width:100%;height:32px;padding:2px;border:1px solid #e2e8f0;border-radius:7px">
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="saveLot()">Enregistrer</button>
      <button class="btn btn-danger" onclick="deleteLot()" id="del-lot" style="display:none">Supprimer</button>
      <button class="btn" onclick="closeModal('modalLot')">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL LIBRE -->
<div class="overlay" id="modalLibre">
  <div class="modal">
    <div class="modal-title">Zone libre</div>
    <div class="info-box" id="libre-info"></div>
    <div class="field"><label>Texte</label><input type="text" id="fr-text" placeholder="ex: Zone r√©serv√©e, Acc√®s..."></div>
    <div class="field"><label>Couleur de fond</label><div class="swatches" id="libre-swatches"></div></div>
    <div class="field"><label>Style texte</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px">
        <select id="fr-fsize"><option value="8">Petit</option><option value="10" selected>Normal</option><option value="12">Grand</option></select>
        <select id="fr-fweight"><option value="400">Normal</option><option value="700" selected>Gras</option></select>
        <select id="fr-align"><option value="left">G</option><option value="center" selected>C</option><option value="right">D</option></select>
      </div>
    </div>
    <div class="field"><label>Bordure</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">
        <select id="fr-bwidth"><option value="1">Fine</option><option value="2" selected>Normale</option><option value="3">√âpaisse</option></select>
        <select id="fr-bstyle"><option value="solid">Pleine</option><option value="double" selected>Double</option><option value="dashed">Pointill√©e</option></select>
      </div>
      <input type="color" id="fr-bcolor" value="#1a202c" style="width:100%;height:32px;padding:2px;border:1px solid #e2e8f0;border-radius:7px">
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="saveLibre()">Enregistrer</button>
      <button class="btn btn-danger" onclick="deleteLibre()" id="del-libre" style="display:none">Supprimer</button>
      <button class="btn" onclick="closeModal('modalLibre')">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL IMPRESSION -->
<div class="overlay" id="modalPrint">
  <div class="modal">
    <div class="modal-title">Impression</div>
    <div class="field"><label>Titre</label><input type="text" id="pr-title" value="Plan des parcs"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Format</label><select id="pr-format"><option value="A4">A4</option><option value="A3" selected>A3</option></select></div>
      <div class="field"><label>Orientation</label><select id="pr-orient"><option value="landscape" selected>Paysage</option><option value="portrait">Portrait</option></select></div>
    </div>
    <div class="field"><label>Colonnes (de ‚Üí √Ý)</label>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:5px;align-items:center">
        <input type="number" id="pr-c1" value="1" min="1"><span style="text-align:center;font-size:.75rem;color:#999">‚Üí</span><input type="number" id="pr-c2" min="1">
      </div>
    </div>
    <div class="field"><label>Rang√©es (de ‚Üí √Ý)</label>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:5px;align-items:center">
        <input type="number" id="pr-r1" value="1" min="1"><span style="text-align:center;font-size:.75rem;color:#999">‚Üí</span><input type="number" id="pr-r2" min="1">
      </div>
    </div>
    <div class="field"><label style="display:flex;gap:6px;align-items:center"><input type="checkbox" id="pr-nums" checked> Num√©ros colonnes/rang√©es</label></div>
    <div class="field"><label style="display:flex;gap:6px;align-items:center"><input type="checkbox" id="pr-empty" checked> Quadrillage vide</label></div>
    <div class="field" id="pr-sel-field" style="display:none"><label style="display:flex;gap:6px;align-items:center"><input type="checkbox" id="pr-sel-only"> Imprimer uniquement la s√©lection</label></div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="doPrint()">üñ®Ô∏è Lancer</button>
      <button class="btn" onclick="closeModal('modalPrint')">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SK = 'plan_parc_v4';
var CELL = 20;

// ‚îÄ‚îÄ ONGLETS ‚îÄ‚îÄ
// ‚îÄ‚îÄ STRUCTURE : parcs[{id, name, zones:[{id,name,ncols,nrows,ppp,blocks}], activeZone}] ‚îÄ‚îÄ
var parcs = [];
var activeParc = 0;
var nextId = 1;

function newZone(name){ return {id:nextId++, name:name, ncols:100, nrows:30, ppp:2, blocks:[]}; }
function newParc(name){ return {id:nextId++, name:name, zones:[newZone('Zone 1')], activeZone:0}; }
function curParc(){ return parcs[activeParc]; }
function curTab(){ var p=curParc(); return p.zones[p.activeZone]; }

var scale = 1;
var highlighted = [];
var editing = null;
var dragSel = new Set();
var dragActive = false, dragR0 = 0, dragC0 = 0;
var stateHist = [], histIdx = -1;
var COLORS = ['#FAC775','#85B7EB','#F0997B','#97C459','#ED93B1','#AFA9EC','#B4B2A9','#5DCAA5','#F87171','#34D399'];
var selColor = COLORS[0];
var selDir = 'right';
var selMode = false;
var zoneSel = {r1:0,c1:0,r2:0,c2:0,active:false};
var zoneSelDrag = false, zoneR0=0, zoneC0=0;
var ctxTarget = null;

// ‚îÄ‚îÄ UTILS ‚îÄ‚îÄ
function today(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n){ return n<10?'0'+n:n; }
function fmt(iso){ if(!iso)return ''; var p=iso.split('-'); return p[2]+'/'+p[1]+'/'+p[0].slice(2); }
function gram(v){ if(!v)return ''; v=String(v).trim(); return /^\d+([.,]\d+)?$/.test(v)?v+'g':v; }
function esc(s){ var d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function toast(m){ var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800); }
function darken(hex){ var r=Math.max(0,parseInt(hex.slice(1,3),16)-80),g=Math.max(0,parseInt(hex.slice(3,5),16)-80),b=Math.max(0,parseInt(hex.slice(5,7),16)-80); return 'rgb('+r+','+g+','+b+')'; }

// ‚îÄ‚îÄ HISTORIQUE ‚îÄ‚îÄ
function snap(){ return JSON.stringify({parcs:parcs,activeParc:activeParc,nextId:nextId}); }
function pushHist(){
  var s=snap();
  if(histIdx>=0&&stateHist[histIdx]===s)return;
  stateHist=stateHist.slice(0,histIdx+1);
  stateHist.push(s);
  if(stateHist.length>60)stateHist.shift();
  histIdx=stateHist.length-1;
  updHistBtns();
}
function applySnap(s){
  var d=JSON.parse(s);
  parcs=d.parcs;activeParc=d.activeParc;nextId=d.nextId;
  syncInputs();save(true);renderNav();render();
}
function undo(){ if(histIdx<=0)return;histIdx--;applySnap(stateHist[histIdx]);updHistBtns();toast('Annule'); }
function redo(){ if(histIdx>=stateHist.length-1)return;histIdx++;applySnap(stateHist[histIdx]);updHistBtns();toast('Retabli'); }
function updHistBtns(){ document.getElementById('undoBtn').disabled=histIdx<=0;document.getElementById('redoBtn').disabled=histIdx>=stateHist.length-1; }

// ‚îÄ‚îÄ PERSISTANCE ‚îÄ‚îÄ
function save(skip){ localStorage.setItem(SK,snap());if(!skip)pushHist(); }
function load(){
  try{
    var d=JSON.parse(localStorage.getItem(SK)||'{}');
    if(d.parcs&&d.parcs.length){
      parcs=d.parcs;activeParc=d.activeParc||0;nextId=d.nextId||100;
    } else {
      parcs=[newParc('Parc 1')];activeParc=0;
    }
  }catch(e){ parcs=[newParc('Parc 1')];activeParc=0; }
  syncInputs();pushHist();
}
function syncInputs(){
  var t=curTab();
  document.getElementById('inp-cols').value=t.ncols;
  document.getElementById('inp-rows').value=t.nrows;
  document.getElementById('inp-ppp').value=t.ppp;
}

// ‚îÄ‚îÄ SETTINGS ‚îÄ‚îÄ
function applySettings(){
  var t=curTab();
  t.ncols=Math.min(500,Math.max(10,parseInt(document.getElementById('inp-cols').value)||100));
  t.nrows=Math.min(300,Math.max(5,parseInt(document.getElementById('inp-rows').value)||30));
  t.ppp=Math.max(0.1,parseFloat(document.getElementById('inp-ppp').value)||2);

}

// ‚îÄ‚îÄ NAVIGATION DEUX NIVEAUX ‚îÄ‚îÄ
function renderNav(){
  // Parcs (barre sombre)
  var p=document.getElementById('navParcs');
  p.innerHTML=parcs.map(function(parc,i){
    return '<button class="parc-tab'+(i===activeParc?' active':'')+'" onclick="switchParc('+i+')" ondblclick="renameParc('+i+')">'+
      esc(parc.name)+
      (parcs.length>1?'<span class="tab-close" onclick="event.stopPropagation();delParc('+i+')" title="Supprimer">x</span>':'')+
    '</button>';
  }).join('')+
  '<button class="parc-add" onclick="addParc()" title="Nouveau parc">+</button>';

  var parc=curParc();
  var z=document.getElementById('navZones');
  z.innerHTML='<span class="nav-label">'+esc(parc.name)+' :</span>'+
  parc.zones.map(function(zone,i){
    return '<button class="zone-tab'+(i===parc.activeZone?' active':'')+'" onclick="switchZone('+i+')" ondblclick="renameZone('+i+')">'+

function renderTabs(){ renderNav(); }

function switchParc(i){ activeParc=i;highlighted=[];syncInputs();renderNav();render(); }
function addParc(){
  var name=prompt('Nom du parc :','Nouveau parc');
  if(!name||!name.trim())return;
  parcs.push(newParc(name.trim()));
  activeParc=parcs.length-1;
  syncInputs();save();renderNav();render();
}
function delParc(i){
  if(parcs.length===1){toast('Impossible de supprimer le seul parc');return;}
  if(!confirm('Supprimer "'+parcs[i].name+'" et toutes ses zones ?'))return;
  parcs.splice(i,1);
  if(activeParc>=parcs.length)activeParc=parcs.length-1;
  syncInputs();save();renderNav();render();
}
function renameParc(i){
  var name=prompt('Nouveau nom du parc :',parcs[i].name);
  if(name&&name.trim()){parcs[i].name=name.trim();save();renderNav();}
}

function switchZone(i){ curParc().activeZone=i;highlighted=[];syncInputs();renderNav();render(); }
function addZone(){
  var name=prompt('Nom de la zone :','Nouvelle zone');
  if(!name||!name.trim())return;
  curParc().zones.push(newZone(name.trim()));
  curParc().activeZone=curParc().zones.length-1;
  syncInputs();save();renderNav();render();
}
function delZone(i){
  var p=curParc();
  if(p.zones.length===1){toast('Impossible de supprimer la seule zone');return;}
  if(!confirm('Supprimer "'+p.zones[i].name+'" ?'))return;
  p.zones.splice(i,1);
  if(p.activeZone>=p.zones.length)p.activeZone=p.zones.length-1;
  syncInputs();save();renderNav();render();
}
function renameZone(i){
  var p=curParc();
  var name=prompt('Nouveau nom de la zone :',p.zones[i].name);
  if(name&&name.trim()){p.zones[i].name=name.trim();save();renderNav();}
}


// ‚îÄ‚îÄ INSERT / DELETE LIGNES & COLONNES ‚îÄ‚îÄ
function insertRow(idx, before){
  var t=curTab();
  var pos=before?idx:idx+1;
  t.nrows++;
  t.blocks.forEach(function(b){
    if(b.dir==='down'||b.dir==='up'){
      // blocs verticaux: d√©caler si n√©cessaire
      if(b.row>=pos) b.row++;
      else if(b.dir==='down'&&b.row<pos&&b.row+bspan(b)>pos){/* span s'√©tend, on laisse */}
    } else {
      if(b.row>=pos) b.row++;
    }
  });
  document.getElementById('inp-rows').value=t.nrows;
  save();render();toast('Rang√©e ins√©r√©e');
}

function deleteRow(idx){
  var t=curTab();
  if(t.nrows<=1){toast('Impossible de supprimer la derni√®re rang√©e');return;}
  t.nrows--;
  t.blocks=t.blocks.filter(function(b){return b.row!==idx;});
  t.blocks.forEach(function(b){if(b.row>idx)b.row--;});
  document.getElementById('inp-rows').value=t.nrows;
  save();render();toast('Rang√©e supprim√©e');
}

function insertCol(idx, before){
  var t=curTab();
  var pos=before?idx:idx+1;
  t.ncols++;
  t.blocks.forEach(function(b){
    if(b.col>=pos) b.col++;
  });
  document.getElementById('inp-cols').value=t.ncols;
  save();render();toast('Colonne ins√©r√©e');
}

function deleteCol(idx){
  var t=curTab();
  if(t.ncols<=1){toast('Impossible de supprimer la derni√®re colonne');return;}
  t.ncols--;
  t.blocks=t.blocks.filter(function(b){return b.col!==idx;});
  t.blocks.forEach(function(b){if(b.col>idx)b.col--;});
  document.getElementById('inp-cols').value=t.ncols;
  save();render();toast('Colonne supprim√©e');
}

// ‚îÄ‚îÄ MENU CONTEXTUEL ‚îÄ‚îÄ
function openCtxMenu(e, type, idx){
  e.preventDefault();
  ctxTarget={type:type,idx:idx};
  var menu=document.getElementById('ctxMenu');
  var label=type==='row'?'Rang√©e L'+(idx+1):'Colonne '+(idx+1);
  var unit=type==='row'?'rang√©e':'colonne';
  document.getElementById('ctxLabel').textContent=label;
  document.getElementById('ctx-ins-before').textContent='Ins√©rer une '+unit+' avant';
  document.getElementById('ctx-ins-after').textContent='Ins√©rer une '+unit+' apr√®s';
  document.getElementById('ctx-delete').textContent='Supprimer cette '+unit;
  var maxX=window.innerWidth-200, maxY=window.innerHeight-150;
  menu.style.left=Math.min(e.clientX,maxX)+'px';
  menu.style.top=Math.min(e.clientY,maxY)+'px';
  menu.classList.add('open');
}

function ctxAction(action){
  if(!ctxTarget)return;
  document.getElementById('ctxMenu').classList.remove('open');
  var type=ctxTarget.type, idx=ctxTarget.idx;
  if(action==='ins-before'){ if(type==='row')insertRow(idx,true); else insertCol(idx,true); }
  else if(action==='ins-after'){ if(type==='row')insertRow(idx,false); else insertCol(idx,false); }
  else if(action==='delete'){ if(type==='row')deleteRow(idx); else deleteCol(idx); }
  ctxTarget=null;
}

document.addEventListener('click',function(e){
  if(!e.target.closest('#ctxMenu'))document.getElementById('ctxMenu').classList.remove('open');
});

// ‚îÄ‚îÄ MODE SELECTION DE ZONE ‚îÄ‚îÄ
var selMode = false;
var zoneSel = {r1:0,c1:0,r2:0,c2:0,active:false};
var zoneSelDrag = false, zoneR0=0, zoneC0=0;

function toggleSelMode(){
  selMode = !selMode;
  var btn = document.getElementById('selModeBtn');
  btn.className = selMode ? 'btn btn-primary' : 'btn';
  document.getElementById('selInfo').style.display = selMode ? 'inline-block' : 'none';
  if(!selMode){
    zoneSel.active = false;
    document.getElementById('selInfo').textContent = '';
    document.getElementById('pr-sel-field').style.display = 'none';
    renderZoneSel();
  }
  document.getElementById('gridWrap').style.cursor = selMode ? 'cell' : 'crosshair';
}

function renderZoneSel(){
  document.querySelectorAll('td.zone-sel').forEach(function(el){el.classList.remove('zone-sel');});
  if(!zoneSel.active) return;
  var r1=Math.min(zoneSel.r1,zoneSel.r2), r2=Math.max(zoneSel.r1,zoneSel.r2);
  var c1=Math.min(zoneSel.c1,zoneSel.c2), c2=Math.max(zoneSel.c1,zoneSel.c2);
  for(var r=r1;r<=r2;r++) for(var c=c1;c<=c2;c++){
    var el=document.getElementById('c'+r+'_'+c);
    if(el) el.classList.add('zone-sel');
  }
  var nb = (r2-r1+1)*(c2-c1+1);
  document.getElementById('selInfo').textContent = (r2-r1+1)+' rang√©es √ó '+(c2-c1+1)+' colonnes ('+nb+' cases)';
  document.getElementById('pr-sel-field').style.display = 'block';
}

// ‚îÄ‚îÄ ZOOM ‚îÄ‚îÄ
function doZoom(d){
  if(d===-99)scale=1; else scale=Math.max(0.2,Math.min(4,Math.round((scale+d)*10)/10));
  // On applique le zoom sur la table directement (pas sur gridInner)
  // pour que les sticky headers restent fixes
  document.getElementById('grid').style.zoom=scale;
  document.getElementById('zoom-label').textContent=Math.round(scale*100)+'%';
}

// ‚îÄ‚îÄ BLOCS ‚îÄ‚îÄ
function bpx(b){ return b.type==='libre'? Math.max(CELL,(b.nbcases||1)*CELL) : Math.max(CELL,Math.round((b.poches||1)/curTab().ppp)); }
function bspan(b){ return Math.max(1,Math.min(500,Math.ceil(bpx(b)/CELL))); }
function bcells(b){
  var span=bspan(b),cells=[];
  for(var i=0;i<span;i++){
    var r=b.row,c=b.col;
    if(b.dir==='right')c+=i; else if(b.dir==='left')c-=i;
    else if(b.dir==='down')r+=i; else if(b.dir==='up')r-=i;
    cells.push([r,c]);
  }
  return cells;
}
function occ(){
  var m={};
  curTab().blocks.forEach(function(b,bi){ bcells(b).forEach(function(p){ m[p[0]+'_'+p[1]]=bi; }); });
  return m;
}
function blabel(b){
  var p=[b.poches+'p'];
  if(b.gram)p.push(gram(b.gram));
  if(b.lot)p.push(b.lot);
  if(b.poids)p.push(b.poids+'kg');
  if(b.date)p.push(fmt(b.date));
  return p.join(' ');
}

// ‚îÄ‚îÄ RENDER ‚îÄ‚îÄ
function render(){
  var t=curTab();
  var _ncols=t.ncols, _nrows=t.nrows;
  var map=occ();
  var html='<colgroup><col class="rowhead-col">';
  for(var ci=0;ci<_ncols;ci++)html+='<col>';
  html+='</colgroup>';
  html+='<thead><tr><th class="corner"></th>';
  for(var c=0;c<_ncols;c++)html+='<th class="ch" oncontextmenu="openCtxMenu(event,\'col\','+c+')">'+(c+1)+'</th>';
  html+='</tr></thead><tbody>';
  for(var r=0;r<_nrows;r++){
    html+='<tr><th class="rh" oncontextmenu="openCtxMenu(event,\'row\','+r+')">L'+(r+1)+'</th>';
    var c2=0;
    while(c2<_ncols){
      var bi=map[r+'_'+c2];
      if(bi===undefined){
        var ds=dragSel.has(r+'_'+c2);
        var zs=zoneSel.active&&r>=Math.min(zoneSel.r1,zoneSel.r2)&&r<=Math.max(zoneSel.r1,zoneSel.r2)&&c2>=Math.min(zoneSel.c1,zoneSel.c2)&&c2<=Math.max(zoneSel.c1,zoneSel.c2);
        html+='<td class="cell'+(ds?' drag-sel':zs?' zone-sel':'')+'" id="c'+r+'_'+c2+'" data-r="'+r+'" data-c="'+c2+'"></td>';
        c2++;
      } else {
        var b=t.blocks[bi];
        var cells=bcells(b);
        var isVert=b.dir==='up'||b.dir==='down';
        var isFirst=!cells.some(function(p){return map[p[0]+'_'+p[1]]===bi&&(p[0]<r||(p[0]===r&&p[1]<c2));});
        if(!isFirst){c2++;continue;}
        var isHL=highlighted.indexOf(bi)!==-1;
        var label=b.type==='libre'?(b.text||''):blabel(b);
        var fs=b.fsize||'10'; var fw=b.fweight||'700'; var ta=b.align||'center';
        var bw=b.bwidth||'2'; var bs2=b.bstyle||'double'; var bc=b.bcolor||'#1a202c';
        var style='background:'+b.color+'55;border:'+bw+'px '+bs2+' '+bc+';color:'+darken(b.color)+';font-size:'+fs+'px;font-weight:'+fw+';text-align:'+ta+';overflow:hidden;white-space:nowrap;text-overflow:ellipsis';
        if(isHL)style+=';outline:2px solid #e63946;outline-offset:-2px;z-index:2';
        var visibleCells=cells.filter(function(p){return p[0]===r;});
        var span=isVert?1:visibleCells.length;
        var w=isVert?CELL:span*CELL;
        var h=isVert?cells.length*CELL:CELL;
        style+=';width:'+w+'px;max-width:'+w+'px;height:'+h+'px;max-height:'+h+'px';
        var inner=isVert?'<div style="writing-mode:vertical-rl;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden">'+esc(label)+'</div>':esc(label);
        var spanAttr=isVert?'rowspan="'+cells.length+'"':'colspan="'+span+'"';
        html+='<td class="blockcell'+(isHL?' highlighted':'')+'" '+spanAttr+' style="'+style+'" onclick="clickBlock('+bi+')" title="'+esc(label)+'">'+inner+'</td>';
        if(isVert)c2++; else c2+=span;
      }
    }
    html+='</tr>';
  }
  html+='</tbody>';
  document.getElementById('grid').innerHTML=html;
  updHistBtns();
}

// ‚îÄ‚îÄ INTERACTIONS ‚îÄ‚îÄ
function clickBlock(bi){ openEditBlock(bi); }

function initDrag(){
  var grid=document.getElementById('grid');

  grid.addEventListener('mousedown',function(e){
    if(e.button!==0)return;
    var td=e.target.closest('td[data-r]');
    if(!td)return;
    e.preventDefault();
    if(selMode){
      // MODE SELECTION DE ZONE
      zoneSelDrag=true;
      zoneR0=+td.dataset.r; zoneC0=+td.dataset.c;
      zoneSel={r1:zoneR0,c1:zoneC0,r2:zoneR0,c2:zoneC0,active:true};
      renderZoneSel();
    } else {
      // MODE NORMAL
      dragActive=true;
      dragR0=+td.dataset.r; dragC0=+td.dataset.c;
      dragSel.clear(); dragSel.add(dragR0+'_'+dragC0);
      renderDrag();
    }
  });

  document.addEventListener('mousemove',function(e){
    if(selMode && zoneSelDrag){
      var td=document.elementFromPoint(e.clientX,e.clientY);
      if(!td||!td.dataset||!td.dataset.r)return;
      zoneSel.r2=+td.dataset.r; zoneSel.c2=+td.dataset.c;
      renderZoneSel();
      return;
    }
    if(!dragActive)return;
    var td=document.elementFromPoint(e.clientX,e.clientY);
    if(!td||!td.dataset||!td.dataset.r)return;
    var r=+td.dataset.r,c=+td.dataset.c;
    var r1=Math.min(dragR0,r),r2=Math.max(dragR0,r),c1=Math.min(dragC0,c),c2=Math.max(dragC0,c);
    dragSel.clear();
    for(var rr=r1;rr<=r2;rr++)for(var cc=c1;cc<=c2;cc++)dragSel.add(rr+'_'+cc);
    renderDrag();
  });

  document.addEventListener('mouseup',function(){
    if(selMode && zoneSelDrag){
      zoneSelDrag=false;
      renderZoneSel();
      return;
    }
    if(!dragActive)return;
    dragActive=false;
    if(dragSel.size===0)return;
    var sel=new Set(dragSel);
    dragSel.clear();
    renderDrag();
    if(sel.size===1){
      var k=Array.from(sel)[0].split('_');
      openNewLot(+k[0],+k[1]);
    } else {
      var minR=999,minC=999;
      sel.forEach(function(k){var p=k.split('_');minR=Math.min(minR,+p[0]);minC=Math.min(minC,+p[1]);});
      openNewLibre(minR,minC,sel.size);
    }
  });

  // zoom molette
  document.getElementById('gridWrap').addEventListener('wheel',function(e){
    if(e.ctrlKey||e.metaKey){e.preventDefault();doZoom(e.deltaY<0?0.15:-0.15);}
  },{passive:false});

  // keyboard
  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
    if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redo();}
    if(e.key==='Escape'&&selMode){toggleSelMode();}
  });
}

function renderDrag(){
  document.querySelectorAll('td.drag-sel').forEach(function(el){el.classList.remove('drag-sel');});
  dragSel.forEach(function(k){var el=document.getElementById('c'+k);if(el)el.classList.add('drag-sel');});
}

function deleteLot(){ if(!editing||editing.isNew)return;curTab().blocks.splice(editing.bi,1);closeModal('modalLot');save();render();toast('Bloc supprim√©'); }

// ‚îÄ‚îÄ RECHERCHE / CALCULS ‚îÄ‚îÄ
function doSearch(){
  var val=document.getElementById('inp-search').value.trim();
  if(!val){clearSearch();return;}
  highlighted=[];
  curTab().blocks.forEach(function(b,bi){if(b.type==='lot'&&b.lot===val)highlighted.push(bi);});
  var tot=highlighted.reduce(function(s,bi){return s+(parseInt(curTab().blocks[bi].poches)||0);},0);
  showRes('<strong>'+esc(val)+'</strong> ‚Äî '+highlighted.length+' bloc'+(highlighted.length>1?'s':'')+' ‚Äî <strong>'+tot+' poches</strong>');
  render();
}

function clearSearch(){
  highlighted=[];document.getElementById('inp-search').value='';
  document.getElementById('results').classList.remove('open');
  render();
}

function calcVides(){
  var idx=[];
  curTab().blocks.forEach(function(b,bi){
    var fields=[b.lot,b.gram,b.text];
    if(fields.some(function(f){if(!f)return false;var v=String(f).trim().toLowerCase();return v==='v'||/^\d*\s*v$/.test(v);}))idx.push(bi);
  });
  if(!idx.length){showRes('Aucun emplacement vide d√©tect√©.');return;}
  var tot=idx.reduce(function(s,bi){return s+(parseInt(curTab().blocks[bi].poches)||parseInt(curTab().blocks[bi].nbcases)||0);},0);
  highlighted=idx;render();
  var rows=idx.map(function(bi){return '<tr onclick="highlighted=['+bi+'];render()"><td>L'+(curTab().blocks[bi].row+1)+'</td><td>'+(curTab().blocks[bi].poches||curTab().blocks[bi].nbcases||0)+'p</td></tr>';}).join('');
  showRes('<div style="display:flex;align-items:center;justify-content:space-between"><strong>'+idx.length+' emplacement'+(idx.length>1?'s':'')+' vide ‚Äî '+tot+' poches</strong><button class="btn" onclick="highlighted='+JSON.stringify(idx)+';render()">Tout s√©lectionner</button></div><table><tr><th>Rang√©e</th><th>Poches</th></tr>'+rows+'</table>');
}

function calcRef(ref){
  var idx=[];
  curTab().blocks.forEach(function(b,bi){if(b.type==='lot'&&b.gram&&String(b.gram).trim().toUpperCase()===ref.toUpperCase())idx.push(bi);});
  if(!idx.length){showRes('Aucune case '+esc(ref)+' trouv√©e.');return;}
  var totP=0,totKg=0;
  var rows=idx.map(function(bi){
    var b=curTab().blocks[bi];var p=parseInt(b.poches)||0;var kg=parseFloat(b.poids)||0;var l=kg?+(p*kg).toFixed(1):0;
    totP+=p;totKg+=l;
    return '<tr onclick="highlighted=['+bi+'];render()"><td>'+esc(b.lot||'‚Äî')+'</td><td>'+p+'p</td><td>'+(kg?kg+'kg':'‚Äî')+'</td><td>'+(l?l+'kg':'‚Äî')+'</td></tr>';
  }).join('');
  highlighted=idx;render();
  showRes('<div style="display:flex;align-items:center;justify-content:space-between"><strong>'+esc(ref)+' ‚Äî '+totP+' poches ‚Äî '+totKg.toFixed(1)+' kg</strong><button class="btn" onclick="highlighted='+JSON.stringify(idx)+';render()">Tout s√©lectionner</button></div><table><tr><th>Lot</th><th>Poches</th><th>Poids/p</th><th>Total</th></tr>'+rows+'</table>');
}

function showRes(html){
  document.getElementById('res-content').innerHTML=html;
  document.getElementById('results').classList.add('open');
}

// ‚îÄ‚îÄ RESET / EXPORT / IMPORT ‚îÄ‚îÄ
function resetAll(){
  if(!confirm('Tout effacer ?'))return;
  curTab().blocks=[];highlighted=[];save();render();toast('Plan effac√©');
}
function exportData(){
  var blob=new Blob([JSON.stringify({tabs:tabs,activeTab:activeTab,nextTabId:nextTabId},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='plan-parc.json';a.click();
  toast('Export t√©l√©charg√©');
}
function importData(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(d.tabs){
        tabs=d.tabs;activeTab=d.activeTab||0;nextTabId=d.nextTabId||2;
      } else {
        // ancien format
        var t=curTab();
        t.ncols=d.ncols||100;t.nrows=d.nrows||30;t.ppp=d.ppp||2;t.blocks=d.blocks||[];
      }
      syncInputs();save();renderTabs();render();toast('Import r√©ussi');
    }catch(err){alert('Fichier invalide.');}
  };
  r.readAsText(f);e.target.value='';
}

// ‚îÄ‚îÄ IMPRESSION ‚îÄ‚îÄ
function openPrint(){
  var c1=1,c2=curTab().ncols,r1=1,r2=curTab().nrows;
  var hasZone=zoneSel.active;
  if(hasZone){
    c1=Math.min(zoneSel.c1,zoneSel.c2)+1; c2=Math.max(zoneSel.c1,zoneSel.c2)+1;
    r1=Math.min(zoneSel.r1,zoneSel.r2)+1; r2=Math.max(zoneSel.r1,zoneSel.r2)+1;
  }
  document.getElementById('pr-c1').value=c1;
  document.getElementById('pr-c2').value=c2;
  document.getElementById('pr-r1').value=r1;
  document.getElementById('pr-r2').value=r2;
  document.getElementById('pr-sel-field').style.display=hasZone?'block':'none';
  if(hasZone) document.getElementById('pr-sel-only').checked=true;
  document.getElementById('modalPrint').classList.add('open');
}
function doPrint(){
  var title=document.getElementById('pr-title').value||'Plan des parcs';
  var fmt2=document.getElementById('pr-format').value;
  var ori=document.getElementById('pr-orient').value;
  var c1=Math.max(0,(parseInt(document.getElementById('pr-c1').value)||1)-1);
  var c2=Math.min(ncols,parseInt(document.getElementById('pr-c2').value)||ncols);
  var r1=Math.max(0,(parseInt(document.getElementById('pr-r1').value)||1)-1);
  var r2=Math.min(nrows,parseInt(document.getElementById('pr-r2').value)||nrows);
  var nums=document.getElementById('pr-nums').checked;
  var empty=document.getElementById('pr-empty').checked;
  var map=occ();
  var th='<colgroup>'+(nums?'<col style="width:28px">':'');
  for(var ci=c1;ci<c2;ci++)th+='<col>';
  th+='</colgroup>';
  if(nums){th+='<thead><tr><th style="background:#f8f9fa;border:0.5px solid #ddd;font-size:8px"></th>';for(var c=c1;c<c2;c++)th+='<th style="background:#f8f9fa;border:0.5px solid #ddd;font-size:8px;text-align:center">'+(c+1)+'</th>';th+='</tr></thead>';}
  var tb='<tbody>';
  var rendered={};
  for(var r=r1;r<r2;r++){
    tb+='<tr>'+(nums?'<td style="background:#f8f9fa;border:0.5px solid #ddd;font-size:8px;text-align:right;padding-right:3px">L'+(r+1)+'</td>':'');
    var c3=c1;
    while(c3<c2){
      var bi=map[r+'_'+c3];
      if(bi===undefined){tb+='<td style="border:0.5px solid '+(empty?'#e2e8f0':'#f5f5f5')+';background:#fff"></td>';c3++;continue;}
      var b=curTab().blocks[bi];
      var cells2=bcells(b);
      var isVert2=b.dir==='up'||b.dir==='down';
      var isFirst2=!cells2.some(function(p){return map[p[0]+'_'+p[1]]===bi&&(p[0]<r||(p[0]===r&&p[1]<c3));});
      if(!isFirst2){c3++;continue;}
      var lbl2=b.type==='libre'?(b.text||''):blabel(b);
      var sty='background:'+b.color+'55;border:'+(b.bwidth||2)+'px '+(b.bstyle||'double')+' '+(b.bcolor||'#1a202c')+';color:'+darken(b.color)+';font-size:'+(b.fsize||10)+'px;font-weight:'+(b.fweight||700)+';text-align:'+(b.align||'center')+';overflow:hidden;white-space:nowrap;text-overflow:ellipsis';
      var visCells=cells2.filter(function(p){return p[0]===r&&p[1]>=c1&&p[1]<c2;});
      var span2=isVert2?1:Math.max(1,visCells.length);
      var spanAttr2=isVert2?'rowspan="'+Math.min(cells2.length,r2-r)+'"':'colspan="'+span2+'"';
      tb+='<td '+spanAttr2+' style="'+sty+'">'+esc(lbl2)+'</td>';
      if(isVert2)c3++; else c3+=cells2.length;
    }
    tb+='</tr>';
  }
  tb+='</tbody>';
  var w=window.open('','_p','width=1200,height=900');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+esc(title)+'</title><style>@page{size:'+fmt2+' '+ori+';margin:8mm}body{font-family:sans-serif;margin:0}h1{font-size:13px;margin:0 0 5px}table{border-collapse:collapse;table-layout:fixed;width:100%}td,th{padding:0;overflow:hidden;min-width:0;box-sizing:border-box}</style></head><body><h1>'+esc(title)+'</h1><table>'+th+tb+'</table><script>window.onload=function(){window.print();window.close();}<\/script></body></html>');
  w.document.close();
  closeModal('modalPrint');
}
