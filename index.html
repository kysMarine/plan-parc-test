<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan des parcs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#1a202c;height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:.75rem 1.25rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:50;flex-shrink:0}
.header h1{font-size:1rem;font-weight:600;margin-right:8px}
.btn{padding:.4rem .9rem;border-radius:8px;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#1a202c;white-space:nowrap}
.btn:hover{background:#f1f5f9}
.btn-primary{background:#0ea5e9;color:#fff;border-color:#0ea5e9}
.btn-primary:hover{background:#0284c7}
.btn-danger{color:#e24b4a;border-color:#fecaca}
.btn-danger:hover{background:#fff5f5}
.sep{width:1px;height:20px;background:#e2e8f0;flex-shrink:0}
.zoom-info{font-size:.78rem;color:#718096;min-width:40px;text-align:center}

/* GRILLE */
.grid-wrap{overflow:auto;flex:1;min-height:200px;cursor:default;background:#fff}
.grid-inner{transform-origin:top left;will-change:transform;display:inline-block}
table{border-collapse:collapse;table-layout:fixed;width:0}
col{width:10px}
col.rowhead-col{width:30px}
td,th{border:0.5px solid #e8eaed;padding:0;overflow:hidden;min-width:0}
th.corner{position:sticky;top:0;left:0;z-index:4;background:#f8f9fa;width:30px;height:10px}
th.ch{font-size:8px;color:#bbb;font-weight:400;background:#f8f9fa;height:10px;text-align:center;position:sticky;top:0;z-index:3;width:10px}
th.rh{font-size:8px;color:#bbb;font-weight:400;background:#f8f9fa;width:30px;text-align:right;padding-right:4px;position:sticky;left:0;z-index:2}
td.cell{width:10px;height:10px;background:#fff;cursor:crosshair}
td.cell:hover{background:#eff6ff}
td.cell.drag-sel{background:#bfdbfe}
td.blockcell{font-size:8px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
td.blockcell:hover{filter:brightness(.93)}
td.blockcell.highlighted{outline:2px solid #e63946;outline-offset:-1px;z-index:2}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.25rem;width:100%;max-width:340px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:.95rem;font-weight:600;margin-bottom:12px}
.field{margin-bottom:9px}
.field label{display:block;font-size:.75rem;color:#718096;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:.4rem .6rem;border:1px solid #e2e8f0;border-radius:7px;font-size:.82rem;font-family:inherit}
.swatches{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.swatch{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.swatch.sel{border-color:#1a202c}
.modal-btns{display:flex;gap:7px;margin-top:12px}
.modal-btns .btn{flex:1;text-align:center}
.info-box{background:#e0f2fe;border:1px solid #bae6fd;border-radius:7px;padding:.4rem .7rem;font-size:.75rem;color:#075985;margin-bottom:9px;display:none}

/* RESULTATS */
.results{padding:.75rem 1.25rem;background:#fff;border-bottom:1px solid #e2e8f0;display:none;flex-shrink:0}
.results.open{display:block}
.res-card{font-size:.82rem}
.res-card table{width:100%;border-collapse:collapse;margin-top:8px}
.res-card th{text-align:left;padding:4px 8px;border-bottom:1px solid #e2e8f0;font-size:.75rem;font-weight:500;background:#f8f9fa}
.res-card td{padding:4px 8px;border-bottom:1px solid #f1f5f9}
.res-card tr:hover td{background:#f0f9ff;cursor:pointer}

/* PRINT */
@media print{
  .header,.results{display:none!important}
  .grid-wrap{height:auto;overflow:visible}
  .grid-inner{transform:none!important}
}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a202c;color:#fff;padding:.5rem 1.1rem;border-radius:10px;font-size:.82rem;opacity:0;transition:opacity .25s;pointer-events:none;z-index:500}
.toast.show{opacity:1}

/* DROPDOWN */
.dropdown{position:relative;display:inline-block}
.dropdown-btn{display:flex;align-items:center;gap:4px}
.dropdown-btn::after{content:'▾';font-size:.65rem;color:#718096}
.dropdown-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);min-width:160px;z-index:100;overflow:hidden}
.dropdown-menu.open{display:block}
.dropdown-item{display:block;width:100%;text-align:left;padding:.55rem 1rem;font-size:.82rem;font-weight:500;cursor:pointer;border:none;background:#fff;color:#1a202c}
.dropdown-item:hover{background:#f8f9fa}
.dropdown-sep{height:1px;background:#e2e8f0;margin:2px 0}
</style>
</head>
<body>

<div class="header">
  <!-- Ligne 1 : titre + recherche + paramètres grille -->
  <div style="display:flex;align-items:center;gap:10px;width:100%;flex-wrap:nowrap">
    <h1>Plan des parcs</h1>
    <div class="sep"></div>
    <input type="text" id="inp-search" placeholder="Rechercher un lot..." style="width:170px;padding:.35rem .65rem;border:1px solid #e2e8f0;border-radius:7px;font-size:.82rem" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn btn-primary" onclick="doSearch()" style="padding:.35rem .75rem">Chercher</button>
    <button class="btn" onclick="clearSearch()" style="padding:.35rem .6rem">✕</button>
    <div class="sep"></div>
    <label style="font-size:.75rem;color:#718096">Colonnes</label>
    <input type="number" id="inp-cols" value="100" min="10" max="500" style="width:58px;padding:.3rem .5rem;border:1px solid #e2e8f0;border-radius:7px;font-size:.82rem">
    <label style="font-size:.75rem;color:#718096">Rangées</label>
    <input type="number" id="inp-rows" value="30" min="5" max="300" style="width:58px;padding:.3rem .5rem;border:1px solid #e2e8f0;border-radius:7px;font-size:.82rem">
    <label style="font-size:.75rem;color:#718096">Poches/px</label>
    <input type="number" id="inp-ppp" value="2" min="0.1" step="0.1" style="width:58px;padding:.3rem .5rem;border:1px solid #e2e8f0;border-radius:7px;font-size:.82rem">
    <button class="btn btn-primary" onclick="applySettings()">Appliquer</button>
    <div class="sep"></div>
    <button onclick="doZoom(-0.15)" style="width:26px;height:26px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:15px">−</button>
    <span class="zoom-info" id="zoom-label">100%</span>
    <button onclick="doZoom(0.15)" style="width:26px;height:26px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:15px">+</button>
    <button class="btn" onclick="doZoom(-99)">100%</button>
    <div class="sep"></div>
    <!-- Menu Calculs -->
    <div class="dropdown" id="dd-calculs">
      <button class="btn dropdown-btn" onclick="toggleDD('dd-calculs')">Calculs</button>
      <div class="dropdown-menu" id="dd-calculs-menu">
        <button class="dropdown-item" onclick="calcVides();closeDD()">📊 Emplacements vides</button>
        <div class="dropdown-sep"></div>
        <button class="dropdown-item" onclick="calcRef('K2');closeDD()">⚖️ Poids total K2</button>
        <button class="dropdown-item" onclick="calcRef('K3');closeDD()">⚖️ Poids total K3</button>
      </div>
    </div>
    <div class="sep"></div>
    <button class="btn" id="undoBtn" onclick="undo()" disabled>Annuler</button>
    <button class="btn" id="redoBtn" onclick="redo()" disabled>Rétablir</button>
    <div class="sep"></div>
    <!-- Menu Fichier -->
    <div class="dropdown" id="dd-fichier">
      <button class="btn dropdown-btn" onclick="toggleDD('dd-fichier')">Fichier</button>
      <div class="dropdown-menu" id="dd-fichier-menu">
        <button class="dropdown-item" onclick="openPrint();closeDD()">🖨️ Imprimer</button>
        <div class="dropdown-sep"></div>
        <button class="dropdown-item" onclick="exportData();closeDD()">💾 Exporter (.json)</button>
        <div class="dropdown-sep"></div>
        <button class="dropdown-item" style="color:#e24b4a" onclick="resetAll();closeDD()">🗑 Tout effacer</button>
      </div>
    </div>
  </div>
</div>

<div class="results" id="results"><div class="res-card" id="res-content"></div></div>

<div class="grid-wrap" id="gridWrap">
  <div class="grid-inner" id="gridInner">
    <table id="grid"></table>
  </div>
</div>

<!-- MODAL LOT -->
<div class="overlay" id="modalLot">
  <div class="modal">
    <div class="modal-title" id="lot-title">Nouveau lot</div>
    <div class="field">
      <label>Nombre de poches</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" id="l-poches" min="1" value="10" style="flex:1">
        <label style="display:flex;align-items:center;gap:5px;font-size:.78rem;color:#718096;cursor:pointer;white-space:nowrap">
          <input type="checkbox" id="l-vide" onchange="toggleVide()"> Vide
        </label>
      </div>
    </div>
    <div id="lot-detail-fields">
    <div class="field"><label>Grammage / Référence</label><input type="text" id="l-gram" placeholder="ex: 12 ou K2"></div>
    <div class="field"><label>Numéro de lot</label><input type="text" id="l-lot" placeholder="ex: 02S25"></div>
    <div class="field"><label>Poids/p (kg)</label><input type="number" id="l-poids" step="0.1" placeholder="ex: 2.4"></div>
    <div class="field"><label>Date</label><input type="date" id="l-date"></div>
    <div class="field"><label>Notes</label><input type="text" id="l-notes" placeholder="observations"></div>
    </div>
    <div class="field"><label>Direction</label>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:120px">
        <span></span><button type="button" class="btn" id="d-up" onclick="setDir('up')">↑</button><span></span>
        <button type="button" class="btn" id="d-left" onclick="setDir('left')">←</button>
        <span style="display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#ccc">●</span>
        <button type="button" class="btn" id="d-right" onclick="setDir('right')">→</button>
        <span></span><button type="button" class="btn" id="d-down" onclick="setDir('down')">↓</button><span></span>
      </div>
    </div>
    <div class="field"><label>Couleur</label><div class="swatches" id="lot-swatches"></div></div>
    <div class="field"><label>Style texte</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px">
        <select id="l-fsize"><option value="8">Petit</option><option value="10" selected>Normal</option><option value="12">Grand</option></select>
        <select id="l-fweight"><option value="400">Normal</option><option value="700" selected>Gras</option></select>
        <select id="l-align"><option value="left">G</option><option value="center" selected>C</option><option value="right">D</option></select>
      </div>
    </div>
    <div class="field"><label>Bordure</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">
        <select id="l-bwidth"><option value="1">Fine</option><option value="2" selected>Normale</option><option value="3">Épaisse</option></select>
        <select id="l-bstyle"><option value="solid">Pleine</option><option value="double" selected>Double</option><option value="dashed">Pointillée</option></select>
      </div>
      <input type="color" id="l-bcolor" value="#1a202c" style="width:100%;height:32px;padding:2px;border:1px solid #e2e8f0;border-radius:7px">
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="saveLot()">Enregistrer</button>
      <button class="btn btn-danger" onclick="deleteLot()" id="del-lot" style="display:none">Supprimer</button>
      <button class="btn" onclick="closeModal('modalLot')">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL LIBRE -->
<div class="overlay" id="modalLibre">
  <div class="modal">
    <div class="modal-title">Zone libre</div>
    <div class="info-box" id="libre-info"></div>
    <div class="field"><label>Texte</label><input type="text" id="fr-text" placeholder="ex: Zone réservée, Accès..."></div>
    <div class="field"><label>Couleur de fond</label><div class="swatches" id="libre-swatches"></div></div>
    <div class="field"><label>Style texte</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px">
        <select id="fr-fsize"><option value="8">Petit</option><option value="10" selected>Normal</option><option value="12">Grand</option></select>
        <select id="fr-fweight"><option value="400">Normal</option><option value="700" selected>Gras</option></select>
        <select id="fr-align"><option value="left">G</option><option value="center" selected>C</option><option value="right">D</option></select>
      </div>
    </div>
    <div class="field"><label>Bordure</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">
        <select id="fr-bwidth"><option value="1">Fine</option><option value="2" selected>Normale</option><option value="3">Épaisse</option></select>
        <select id="fr-bstyle"><option value="solid">Pleine</option><option value="double" selected>Double</option><option value="dashed">Pointillée</option></select>
      </div>
      <input type="color" id="fr-bcolor" value="#1a202c" style="width:100%;height:32px;padding:2px;border:1px solid #e2e8f0;border-radius:7px">
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="saveLibre()">Enregistrer</button>
      <button class="btn btn-danger" onclick="deleteLibre()" id="del-libre" style="display:none">Supprimer</button>
      <button class="btn" onclick="closeModal('modalLibre')">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL IMPRESSION -->
<div class="overlay" id="modalPrint">
  <div class="modal">
    <div class="modal-title">Impression</div>
    <div class="field"><label>Titre</label><input type="text" id="pr-title" value="Plan des parcs"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Format</label><select id="pr-format"><option value="A4">A4</option><option value="A3" selected>A3</option></select></div>
      <div class="field"><label>Orientation</label><select id="pr-orient"><option value="landscape" selected>Paysage</option><option value="portrait">Portrait</option></select></div>
    </div>
    <div class="field"><label>Colonnes (de → à)</label>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:5px;align-items:center">
        <input type="number" id="pr-c1" value="1" min="1"><span style="text-align:center;font-size:.75rem;color:#999">→</span><input type="number" id="pr-c2" min="1">
      </div>
    </div>
    <div class="field"><label>Rangées (de → à)</label>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:5px;align-items:center">
        <input type="number" id="pr-r1" value="1" min="1"><span style="text-align:center;font-size:.75rem;color:#999">→</span><input type="number" id="pr-r2" min="1">
      </div>
    </div>
    <div class="field"><label style="display:flex;gap:6px;align-items:center"><input type="checkbox" id="pr-nums" checked> Numéros colonnes/rangées</label></div>
    <div class="field"><label style="display:flex;gap:6px;align-items:center"><input type="checkbox" id="pr-empty" checked> Quadrillage vide</label></div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="doPrint()">🖨️ Lancer</button>
      <button class="btn" onclick="closeModal('modalPrint')">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SK = 'plan_parc_v3';
var CELL = 10;
var ncols = 100, nrows = 30, ppp = 2;
var blocks = [];
var scale = 1;
var highlighted = [];
var editing = null;
var dragSel = new Set();
var dragActive = false, dragR0 = 0, dragC0 = 0;
var stateHist = [], histIdx = -1;
var COLORS = ['#FAC775','#85B7EB','#F0997B','#97C459','#ED93B1','#AFA9EC','#B4B2A9','#5DCAA5','#F87171','#34D399'];
var selColor = COLORS[0];
var selDir = 'right';

// ── UTILS ──
function today(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n){ return n<10?'0'+n:n; }
function fmt(iso){ if(!iso)return ''; var p=iso.split('-'); return p[2]+'/'+p[1]+'/'+p[0].slice(2); }
function gram(v){ if(!v)return ''; v=String(v).trim(); return /^\d+([.,]\d+)?$/.test(v)?v+'g':v; }
function esc(s){ var d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function toast(m){ var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800); }
function darken(hex){ var r=Math.max(0,parseInt(hex.slice(1,3),16)-80),g=Math.max(0,parseInt(hex.slice(3,5),16)-80),b=Math.max(0,parseInt(hex.slice(5,7),16)-80); return 'rgb('+r+','+g+','+b+')'; }

// ── HISTORIQUE ──
function snap(){ return JSON.stringify({ncols:ncols,nrows:nrows,ppp:ppp,blocks:blocks}); }
function pushHist(){
  var s=snap();
  if(histIdx>=0&&stateHist[histIdx]===s)return;
  history=stateHist.slice(0,histIdx+1);
  stateHist.push(s);
  if(stateHist.length>60)history.shift();
  histIdx=stateHist.length-1;
  updHistBtns();
}
function applySnap(s){ var d=JSON.parse(s);ncols=d.ncols;nrows=d.nrows;ppp=d.ppp;blocks=d.blocks;document.getElementById('inp-cols').value=ncols;document.getElementById('inp-rows').value=nrows;document.getElementById('inp-ppp').value=ppp;save(true);render(); }
function undo(){ if(histIdx<=0)return;histIdx--;applySnap(stateHist[histIdx]);updHistBtns();toast('Annulé'); }
function redo(){ if(histIdx>=stateHist.length-1)return;histIdx++;applySnap(stateHist[histIdx]);updHistBtns();toast('Rétabli'); }
function updHistBtns(){ document.getElementById('undoBtn').disabled=histIdx<=0;document.getElementById('redoBtn').disabled=histIdx>=stateHist.length-1; }

// ── PERSISTANCE ──
function save(skip){ localStorage.setItem(SK,snap());if(!skip)pushHist(); }
function load(){
  try{ var d=JSON.parse(localStorage.getItem(SK)||'{}');ncols=d.ncols||100;nrows=d.nrows||30;ppp=d.ppp||2;blocks=d.blocks||[]; }catch(e){}
  document.getElementById('inp-cols').value=ncols;
  document.getElementById('inp-rows').value=nrows;
  document.getElementById('inp-ppp').value=ppp;
  pushHist();
}

// ── SETTINGS ──
function applySettings(){
  ncols=Math.min(500,Math.max(10,parseInt(document.getElementById('inp-cols').value)||100));
  nrows=Math.min(300,Math.max(5,parseInt(document.getElementById('inp-rows').value)||30));
  ppp=Math.max(0.1,parseFloat(document.getElementById('inp-ppp').value)||2);
  save();render();
}

// ── VIDE TOGGLE ──
function toggleVide(){
  var isVide = document.getElementById('l-vide').checked;
  document.getElementById('lot-detail-fields').style.display = isVide ? 'none' : 'block';
  if(isVide){
    // Couleur rouge automatique
    selColor = '#F87171';
    buildSw('lot-swatches','pickLotColor');
  }
}

// ── DROPDOWNS ──
function toggleDD(id){
  var menu=document.getElementById(id+'-menu');
  var isOpen=menu.classList.contains('open');
  closeDD();
  if(!isOpen)menu.classList.add('open');
}
function closeDD(){
  document.querySelectorAll('.dropdown-menu.open').forEach(function(m){m.classList.remove('open');});
}
document.addEventListener('click',function(e){
  if(!e.target.closest('.dropdown'))closeDD();
});

// ── ZOOM ──
function doZoom(d){
  if(d===-99)scale=1; else scale=Math.max(0.2,Math.min(4,Math.round((scale+d)*10)/10));
  document.getElementById('gridInner').style.transform='scale('+scale+')';
  document.getElementById('zoom-label').textContent=Math.round(scale*100)+'%';
}

// ── BLOCS ──
function bpx(b){ return b.type==='libre'? Math.max(CELL,(b.nbcases||1)*CELL) : Math.max(CELL,Math.round((b.poches||1)/ppp)); }
function bspan(b){ return Math.max(1,Math.min(500,Math.ceil(bpx(b)/CELL))); }
function bcells(b){
  var span=bspan(b),cells=[];
  for(var i=0;i<span;i++){
    var r=b.row,c=b.col;
    if(b.dir==='right')c+=i; else if(b.dir==='left')c-=i;
    else if(b.dir==='down')r+=i; else if(b.dir==='up')r-=i;
    cells.push([r,c]);
  }
  return cells;
}
function occ(){
  var m={};
  blocks.forEach(function(b,bi){ bcells(b).forEach(function(p){ m[p[0]+'_'+p[1]]=bi; }); });
  return m;
}
function blabel(b){
  var p=[b.poches+'p'];
  if(b.gram)p.push(gram(b.gram));
  if(b.lot)p.push(b.lot);
  if(b.poids)p.push(b.poids+'kg');
  if(b.date)p.push(fmt(b.date));
  return p.join(' ');
}

// ── RENDER ──
function render(){
  var map=occ();
  var html='<colgroup><col class="rowhead-col">';
  for(var ci=0;ci<ncols;ci++)html+='<col>';
  html+='</colgroup>';
  html+='<thead><tr><th class="corner"></th>';
  for(var c=0;c<ncols;c++)html+='<th class="ch">'+(c+1)+'</th>';
  html+='</tr></thead><tbody>';
  for(var r=0;r<nrows;r++){
    html+='<tr><th class="rh">L'+(r+1)+'</th>';
    var c2=0;
    while(c2<ncols){
      var bi=map[r+'_'+c2];
      if(bi===undefined){
        var ds=dragSel.has(r+'_'+c2);
        html+='<td class="cell'+(ds?' drag-sel':'')+'" id="c'+r+'_'+c2+'" data-r="'+r+'" data-c="'+c2+'"></td>';
        c2++;
      } else {
        var b=blocks[bi];
        var cells=bcells(b);
        var isVert=b.dir==='up'||b.dir==='down';
        var isFirst=!cells.some(function(p){return map[p[0]+'_'+p[1]]===bi&&(p[0]<r||(p[0]===r&&p[1]<c2));});
        if(!isFirst){c2++;continue;}
        var isHL=highlighted.indexOf(bi)!==-1;
        var label=b.type==='libre'?(b.text||''):blabel(b);
        var fs=b.fsize||'10'; var fw=b.fweight||'700'; var ta=b.align||'center';
        var bw=b.bwidth||'2'; var bs2=b.bstyle||'double'; var bc=b.bcolor||'#1a202c';
        var style='background:'+b.color+'55;border:'+bw+'px '+bs2+' '+bc+';color:'+darken(b.color)+';font-size:'+fs+'px;font-weight:'+fw+';text-align:'+ta+';overflow:hidden;white-space:nowrap;text-overflow:ellipsis';
        if(isHL)style+=';outline:2px solid #e63946;outline-offset:-2px;z-index:2';
        var visibleCells=cells.filter(function(p){return p[0]===r;});
        var span=isVert?1:visibleCells.length;
        var w=isVert?CELL:span*CELL;
        var h=isVert?cells.length*CELL:CELL;
        style+=';width:'+w+'px;max-width:'+w+'px;height:'+h+'px;max-height:'+h+'px';
        var inner=isVert?'<div style="writing-mode:vertical-rl;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden">'+esc(label)+'</div>':esc(label);
        var spanAttr=isVert?'rowspan="'+cells.length+'"':'colspan="'+span+'"';
        html+='<td class="blockcell'+(isHL?' highlighted':'')+'" '+spanAttr+' style="'+style+'" onclick="clickBlock('+bi+')" title="'+esc(label)+'">'+inner+'</td>';
        if(isVert)c2++; else c2+=span;
      }
    }
    html+='</tr>';
  }
  html+='</tbody>';
  document.getElementById('grid').innerHTML=html;
  updHistBtns();
}

// ── INTERACTIONS ──
function clickBlock(bi){ openEditBlock(bi); }

function initDrag(){
  var grid=document.getElementById('grid');
  grid.addEventListener('mousedown',function(e){
    if(e.button!==0)return;
    var td=e.target.closest('td[data-r]');
    if(!td)return;
    e.preventDefault();
    dragActive=true;
    dragR0=+td.dataset.r; dragC0=+td.dataset.c;
    dragSel.clear(); dragSel.add(dragR0+'_'+dragC0);
    renderDrag();
  });
  document.addEventListener('mousemove',function(e){
    if(!dragActive)return;
    var td=document.elementFromPoint(e.clientX,e.clientY);
    if(!td||!td.dataset||!td.dataset.r)return;
    var r=+td.dataset.r,c=+td.dataset.c;
    var r1=Math.min(dragR0,r),r2=Math.max(dragR0,r),c1=Math.min(dragC0,c),c2=Math.max(dragC0,c);
    dragSel.clear();
    for(var rr=r1;rr<=r2;rr++)for(var cc=c1;cc<=c2;cc++)dragSel.add(rr+'_'+cc);
    renderDrag();
  });
  document.addEventListener('mouseup',function(){
    if(!dragActive)return;
    dragActive=false;
    if(dragSel.size===0)return;
    var sel=new Set(dragSel);
    dragSel.clear();
    renderDrag();
    if(sel.size===1){
      var k=Array.from(sel)[0].split('_');
      openNewLot(+k[0],+k[1]);
    } else {
      var minR=999,minC=999;
      sel.forEach(function(k){var p=k.split('_');minR=Math.min(minR,+p[0]);minC=Math.min(minC,+p[1]);});
      openNewLibre(minR,minC,sel.size);
    }
  });
  // zoom molette
  document.getElementById('gridWrap').addEventListener('wheel',function(e){
    if(e.ctrlKey||e.metaKey){e.preventDefault();doZoom(e.deltaY<0?0.15:-0.15);}
  },{passive:false});
  // keyboard
  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
    if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redo();}
  });
}

function renderDrag(){
  document.querySelectorAll('td.drag-sel').forEach(function(el){el.classList.remove('drag-sel');});
  dragSel.forEach(function(k){var el=document.getElementById('c'+k);if(el)el.classList.add('drag-sel');});
}

// ── SWATCHES ──
function buildSw(id,onPick){
  document.getElementById(id).innerHTML=COLORS.map(function(c){
    return '<div class="swatch'+(c===selColor?' sel':'')+'" style="background:'+c+'" onclick="'+onPick+'(\''+c+'\')"></div>';
  }).join('');
}
function pickLotColor(c){selColor=c;buildSw('lot-swatches','pickLotColor');}
function pickLibreColor(c){selColor=c;buildSw('libre-swatches','pickLibreColor');}

// ── DIR BUTTONS ──
function setDir(d){
  selDir=d;
  ['up','down','left','right'].forEach(function(x){
    var b=document.getElementById('d-'+x);
    if(b)b.className='btn'+(x===d?' btn-primary':'');
  });
}

// ── OPEN MODALS ──
function openNewLot(r,c){
  editing={isNew:true,row:r,col:c};
  document.getElementById('lot-title').textContent='Nouveau lot';
  document.getElementById('l-poches').value=10;
  document.getElementById('l-gram').value='';
  document.getElementById('l-lot').value='';
  document.getElementById('l-poids').value='';
  document.getElementById('l-date').value=today();
  document.getElementById('l-notes').value='';
  document.getElementById('l-vide').checked=false;
  document.getElementById('lot-detail-fields').style.display='block';
  document.getElementById('l-fsize').value='10';
  document.getElementById('l-fweight').value='700';
  document.getElementById('l-align').value='center';
  document.getElementById('l-bwidth').value='2';
  document.getElementById('l-bstyle').value='double';
  document.getElementById('l-bcolor').value='#1a202c';
  selColor=COLORS[Math.floor(Math.random()*COLORS.length)];
  selDir='right';
  buildSw('lot-swatches','pickLotColor');
  setDir('right');
  document.getElementById('del-lot').style.display='none';
  document.getElementById('modalLot').classList.add('open');
}

function openNewLibre(r,c,nb){
  editing={isNew:true,row:r,col:c,nbcases:nb};
  document.getElementById('libre-info').textContent=nb+' case'+(nb>1?'s':'')+' sélectionnée'+(nb>1?'s':'')+' · départ L'+(r+1)+' col '+(c+1);
  document.getElementById('libre-info').style.display='block';
  document.getElementById('fr-text').value='';
  document.getElementById('fr-fsize').value='10';
  document.getElementById('fr-fweight').value='700';
  document.getElementById('fr-align').value='center';
  document.getElementById('fr-bwidth').value='2';
  document.getElementById('fr-bstyle').value='double';
  document.getElementById('fr-bcolor').value='#1a202c';
  selColor=COLORS[Math.floor(Math.random()*COLORS.length)];
  buildSw('libre-swatches','pickLibreColor');
  document.getElementById('del-libre').style.display='none';
  document.getElementById('modalLibre').classList.add('open');
}

function openEditBlock(bi){
  var b=blocks[bi];
  editing={isNew:false,bi:bi};
  selColor=b.color; selDir=b.dir||'right';
  if(b.type==='libre'){
    document.getElementById('libre-info').style.display='none';
    document.getElementById('fr-text').value=b.text||'';
    document.getElementById('fr-fsize').value=b.fsize||'10';
    document.getElementById('fr-fweight').value=b.fweight||'700';
    document.getElementById('fr-align').value=b.align||'center';
    document.getElementById('fr-bwidth').value=b.bwidth||'2';
    document.getElementById('fr-bstyle').value=b.bstyle||'double';
    document.getElementById('fr-bcolor').value=b.bcolor||'#1a202c';
    buildSw('libre-swatches','pickLibreColor');
    document.getElementById('del-libre').style.display='inline-block';
    document.getElementById('modalLibre').classList.add('open');
  } else {
    document.getElementById('lot-title').textContent='Modifier le lot';
    document.getElementById('l-poches').value=b.poches;
    document.getElementById('l-gram').value=b.gram||'';
    document.getElementById('l-lot').value=b.lot||'';
    document.getElementById('l-poids').value=b.poids||'';
    document.getElementById('l-date').value=b.date||'';
    document.getElementById('l-notes').value=b.notes||'';
    var isVide=!!b.vide;
    document.getElementById('l-vide').checked=isVide;
    document.getElementById('lot-detail-fields').style.display=isVide?'none':'block';
    document.getElementById('l-fsize').value=b.fsize||'10';
    document.getElementById('l-fweight').value=b.fweight||'700';
    document.getElementById('l-align').value=b.align||'center';
    document.getElementById('l-bwidth').value=b.bwidth||'2';
    document.getElementById('l-bstyle').value=b.bstyle||'double';
    document.getElementById('l-bcolor').value=b.bcolor||'#1a202c';
    buildSw('lot-swatches','pickLotColor');
    setDir(b.dir||'right');
    document.getElementById('del-lot').style.display='inline-block';
    document.getElementById('modalLot').classList.add('open');
  }
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); editing=null; }

// ── SAVE BLOCS ──
function saveLot(){
  if(!editing)return;
  var isVide=document.getElementById('l-vide').checked;
  var data={
    type:'lot', row:editing.row!==undefined?editing.row:blocks[editing.bi].row,
    col:editing.col!==undefined?editing.col:blocks[editing.bi].col,
    dir:selDir, color:selColor,
    vide:isVide,
    poches:parseInt(document.getElementById('l-poches').value)||1,
    gram:isVide?'v':''+document.getElementById('l-gram').value.trim(),
    lot:isVide?'':document.getElementById('l-lot').value.trim(),
    poids:isVide?'':document.getElementById('l-poids').value,
    date:isVide?'':document.getElementById('l-date').value,
    notes:isVide?'':document.getElementById('l-notes').value.trim(),
    fsize:document.getElementById('l-fsize').value,
    fweight:document.getElementById('l-fweight').value,
    align:document.getElementById('l-align').value,
    bwidth:document.getElementById('l-bwidth').value,
    bstyle:document.getElementById('l-bstyle').value,
    bcolor:document.getElementById('l-bcolor').value
  };
  if(editing.isNew)blocks.push(data); else blocks[editing.bi]=data;
  closeModal('modalLot');save();render();toast(isVide?'Emplacement vide enregistré':'Bloc enregistré');
}

function saveLibre(){
  if(!editing)return;
  var row=editing.row!==undefined?editing.row:blocks[editing.bi].row;
  var col=editing.col!==undefined?editing.col:blocks[editing.bi].col;
  var nb=editing.nbcases||blocks[editing.bi].nbcases||1;
  var data={
    type:'libre', row:row, col:col, dir:'right', color:selColor, nbcases:nb,
    text:document.getElementById('fr-text').value.trim(),
    fsize:document.getElementById('fr-fsize').value,
    fweight:document.getElementById('fr-fweight').value,
    align:document.getElementById('fr-align').value,
    bwidth:document.getElementById('fr-bwidth').value,
    bstyle:document.getElementById('fr-bstyle').value,
    bcolor:document.getElementById('fr-bcolor').value
  };
  if(editing.isNew)blocks.push(data); else blocks[editing.bi]=data;
  closeModal('modalLibre');save();render();toast('Zone enregistrée');
}

function deleteLot(){ if(!editing||editing.isNew)return;blocks.splice(editing.bi,1);closeModal('modalLot');save();render();toast('Bloc supprimé'); }
function deleteLibre(){ if(!editing||editing.isNew)return;blocks.splice(editing.bi,1);closeModal('modalLibre');save();render();toast('Zone supprimée'); }

// ── RECHERCHE / CALCULS ──
function doSearch(){
  var val=document.getElementById('inp-search').value.trim();
  if(!val){clearSearch();return;}
  highlighted=[];
  blocks.forEach(function(b,bi){if(b.type==='lot'&&b.lot===val)highlighted.push(bi);});
  var tot=highlighted.reduce(function(s,bi){return s+(parseInt(blocks[bi].poches)||0);},0);
  showRes('<strong>'+esc(val)+'</strong> — '+highlighted.length+' bloc'+(highlighted.length>1?'s':'')+' — <strong>'+tot+' poches</strong>');
  render();
}

function clearSearch(){
  highlighted=[];document.getElementById('inp-search').value='';
  document.getElementById('results').classList.remove('open');
  render();
}

function calcVides(){
  var idx=[];
  blocks.forEach(function(b,bi){
    var fields=[b.lot,b.gram,b.text];
    if(fields.some(function(f){if(!f)return false;var v=String(f).trim().toLowerCase();return v==='v'||/^\d*\s*v$/.test(v);}))idx.push(bi);
  });
  if(!idx.length){showRes('Aucun emplacement vide détecté.');return;}
  var tot=idx.reduce(function(s,bi){return s+(parseInt(blocks[bi].poches)||parseInt(blocks[bi].nbcases)||0);},0);
  highlighted=idx;render();
  var rows=idx.map(function(bi){return '<tr onclick="highlighted=['+bi+'];render()"><td>L'+(blocks[bi].row+1)+'</td><td>'+(blocks[bi].poches||blocks[bi].nbcases||0)+'p</td></tr>';}).join('');
  showRes('<div style="display:flex;align-items:center;justify-content:space-between"><strong>'+idx.length+' emplacement'+(idx.length>1?'s':'')+' vide — '+tot+' poches</strong><button class="btn" onclick="highlighted='+JSON.stringify(idx)+';render()">Tout sélectionner</button></div><table><tr><th>Rangée</th><th>Poches</th></tr>'+rows+'</table>');
}

function calcRef(ref){
  var idx=[];
  blocks.forEach(function(b,bi){if(b.type==='lot'&&b.gram&&String(b.gram).trim().toUpperCase()===ref.toUpperCase())idx.push(bi);});
  if(!idx.length){showRes('Aucune case '+esc(ref)+' trouvée.');return;}
  var totP=0,totKg=0;
  var rows=idx.map(function(bi){
    var b=blocks[bi];var p=parseInt(b.poches)||0;var kg=parseFloat(b.poids)||0;var l=kg?+(p*kg).toFixed(1):0;
    totP+=p;totKg+=l;
    return '<tr onclick="highlighted=['+bi+'];render()"><td>'+esc(b.lot||'—')+'</td><td>'+p+'p</td><td>'+(kg?kg+'kg':'—')+'</td><td>'+(l?l+'kg':'—')+'</td></tr>';
  }).join('');
  highlighted=idx;render();
  showRes('<div style="display:flex;align-items:center;justify-content:space-between"><strong>'+esc(ref)+' — '+totP+' poches — '+totKg.toFixed(1)+' kg</strong><button class="btn" onclick="highlighted='+JSON.stringify(idx)+';render()">Tout sélectionner</button></div><table><tr><th>Lot</th><th>Poches</th><th>Poids/p</th><th>Total</th></tr>'+rows+'</table>');
}

function showRes(html){
  document.getElementById('res-content').innerHTML=html;
  document.getElementById('results').classList.add('open');
}

// ── RESET / EXPORT / IMPORT ──
function resetAll(){
  if(!confirm('Tout effacer ?'))return;
  blocks=[];highlighted=[];save();render();toast('Plan effacé');
}
function exportData(){
  var blob=new Blob([JSON.stringify({ncols:ncols,nrows:nrows,ppp:ppp,blocks:blocks},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='plan-parc.json';a.click();
  toast('Export téléchargé');
}
function importData(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{var d=JSON.parse(ev.target.result);ncols=d.ncols||100;nrows=d.nrows||30;ppp=d.ppp||2;blocks=d.blocks||[];
      document.getElementById('inp-cols').value=ncols;document.getElementById('inp-rows').value=nrows;document.getElementById('inp-ppp').value=ppp;
      save();render();toast('Import réussi');
    }catch(err){alert('Fichier invalide.');}
  };
  r.readAsText(f);e.target.value='';
}

// ── IMPRESSION ──
function openPrint(){
  document.getElementById('pr-c2').value=ncols;
  document.getElementById('pr-r2').value=nrows;
  document.getElementById('modalPrint').classList.add('open');
}
function doPrint(){
  var title=document.getElementById('pr-title').value||'Plan des parcs';
  var fmt2=document.getElementById('pr-format').value;
  var ori=document.getElementById('pr-orient').value;
  var c1=Math.max(0,(parseInt(document.getElementById('pr-c1').value)||1)-1);
  var c2=Math.min(ncols,parseInt(document.getElementById('pr-c2').value)||ncols);
  var r1=Math.max(0,(parseInt(document.getElementById('pr-r1').value)||1)-1);
  var r2=Math.min(nrows,parseInt(document.getElementById('pr-r2').value)||nrows);
  var nums=document.getElementById('pr-nums').checked;
  var empty=document.getElementById('pr-empty').checked;
  var map=occ();
  var th='<colgroup>'+(nums?'<col style="width:28px">':'');
  for(var ci=c1;ci<c2;ci++)th+='<col>';
  th+='</colgroup>';
  if(nums){th+='<thead><tr><th style="background:#f8f9fa;border:0.5px solid #ddd;font-size:8px"></th>';for(var c=c1;c<c2;c++)th+='<th style="background:#f8f9fa;border:0.5px solid #ddd;font-size:8px;text-align:center">'+(c+1)+'</th>';th+='</tr></thead>';}
  var tb='<tbody>';
  var rendered={};
  for(var r=r1;r<r2;r++){
    tb+='<tr>'+(nums?'<td style="background:#f8f9fa;border:0.5px solid #ddd;font-size:8px;text-align:right;padding-right:3px">L'+(r+1)+'</td>':'');
    var c3=c1;
    while(c3<c2){
      var bi=map[r+'_'+c3];
      if(bi===undefined){tb+='<td style="border:0.5px solid '+(empty?'#e2e8f0':'#f5f5f5')+';background:#fff"></td>';c3++;continue;}
      var b=blocks[bi];
      var cells2=bcells(b);
      var isVert2=b.dir==='up'||b.dir==='down';
      var isFirst2=!cells2.some(function(p){return map[p[0]+'_'+p[1]]===bi&&(p[0]<r||(p[0]===r&&p[1]<c3));});
      if(!isFirst2){c3++;continue;}
      var lbl2=b.type==='libre'?(b.text||''):blabel(b);
      var sty='background:'+b.color+'55;border:'+(b.bwidth||2)+'px '+(b.bstyle||'double')+' '+(b.bcolor||'#1a202c')+';color:'+darken(b.color)+';font-size:'+(b.fsize||10)+'px;font-weight:'+(b.fweight||700)+';text-align:'+(b.align||'center')+';overflow:hidden;white-space:nowrap;text-overflow:ellipsis';
      var visCells=cells2.filter(function(p){return p[0]===r&&p[1]>=c1&&p[1]<c2;});
      var span2=isVert2?1:Math.max(1,visCells.length);
      var spanAttr2=isVert2?'rowspan="'+Math.min(cells2.length,r2-r)+'"':'colspan="'+span2+'"';
      tb+='<td '+spanAttr2+' style="'+sty+'">'+esc(lbl2)+'</td>';
      if(isVert2)c3++; else c3+=cells2.length;
    }
    tb+='</tr>';
  }
  tb+='</tbody>';
  var w=window.open('','_p','width=1200,height=900');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+esc(title)+'</title><style>@page{size:'+fmt2+' '+ori+';margin:8mm}body{font-family:sans-serif;margin:0}h1{font-size:13px;margin:0 0 5px}table{border-collapse:collapse;table-layout:fixed;width:100%}td,th{padding:0;overflow:hidden;min-width:0;box-sizing:border-box}</style></head><body><h1>'+esc(title)+'</h1><table>'+th+tb+'</table><script>window.onload=function(){window.print();window.close();}<\/script></body></html>');
  w.document.close();
  closeModal('modalPrint');
}

load();
render();
setTimeout(initDrag,100);
